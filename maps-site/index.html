<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Agrakh Nīmilkad Utheg — the Wide World</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Lora:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Mono:wght@400;600&display=swap"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<style>
  :root{
    --parch:#e9dcc0; --parch2:#efe6cf; --panel:#f3ecd7; --panel2:#e7dabb;
    --ink:#2c2418; --ink2:#4a3f2c; --muted:#6e5f43;
    --line:#c7b58c; --line2:#b09a6c;
    --rust:#8a3c28; --bronze:#8a6224; --water:#3a6478; --moss:#5a6b34;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:var(--parch);color:var(--ink);
    font-family:'Lora',Georgia,serif;}
  #app{display:flex;flex-direction:column;height:100%;}

  header{display:flex;align-items:center;gap:14px;flex-wrap:wrap;
    padding:8px 16px;background:linear-gradient(180deg,var(--panel),var(--panel2));
    border-bottom:2px solid var(--line2);box-shadow:0 2px 8px rgba(44,36,24,.25);
    z-index:1000;position:relative;}
  header h1{font-family:'EB Garamond',serif;font-weight:600;font-size:22px;
    margin:0;letter-spacing:.3px;color:var(--ink);white-space:nowrap;
    text-shadow:0 1px 0 rgba(255,255,255,.4);}
  header h1 .em{color:var(--rust);}
  .search-wrap{position:relative;flex:1 1 220px;max-width:360px;min-width:150px;}
  #search{width:100%;padding:7px 10px;border:1px solid var(--line2);
    background:var(--parch2);color:var(--ink);border-radius:4px;
    font-family:'Lora',serif;font-size:14px;outline:none;}
  #search:focus{border-color:var(--bronze);box-shadow:0 0 0 2px rgba(138,98,36,.2);}
  #suggest{position:absolute;top:100%;left:0;right:0;margin-top:2px;
    background:var(--panel);border:1px solid var(--line2);border-radius:4px;
    box-shadow:0 6px 16px rgba(44,36,24,.3);max-height:280px;overflow:auto;
    display:none;z-index:1200;}
  #suggest.on{display:block;}
  .sug{padding:7px 10px;cursor:pointer;font-size:14px;border-bottom:1px solid rgba(199,181,140,.5);}
  .sug:last-child{border-bottom:none;}
  .sug:hover,.sug.active{background:var(--panel2);}
  .sug .st{font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace;
    text-transform:uppercase;letter-spacing:.5px;}
  .links{display:flex;gap:10px;margin-left:auto;}
  .links a{font-family:'EB Garamond',serif;font-size:15px;color:var(--ink);
    text-decoration:none;padding:5px 11px;border:1px solid var(--line2);
    border-radius:4px;background:var(--parch2);white-space:nowrap;transition:.15s;}
  .links a:hover{background:var(--rust);color:#f5ecd6;border-color:var(--rust);}

  #stage{flex:1 1 auto;position:relative;display:flex;min-height:0;}
  #map{flex:1 1 auto;height:100%;background:#d9cba7;}

  footer{padding:5px 16px;background:var(--panel2);border-top:1px solid var(--line2);
    font-family:'EB Garamond',serif;font-size:13px;color:var(--muted);
    text-align:center;font-style:italic;letter-spacing:.2px;}

  /* ---- markers ---- */
  .mk{display:flex;align-items:center;pointer-events:none;}
  .mk .glyph{pointer-events:auto;display:flex;align-items:center;justify-content:center;
    width:22px;height:22px;border-radius:50%;font-size:14px;line-height:1;
    border:1.5px solid rgba(44,36,24,.55);background:var(--parch2);
    box-shadow:0 1px 3px rgba(0,0,0,.35);color:var(--ink);flex:0 0 auto;cursor:pointer;
    transition:transform .15s ease;}
  .mk .glyph:hover{transform:scale(1.18);}
  .mk .lbl{pointer-events:none;margin-left:5px;font-family:'EB Garamond',serif;
    font-size:13px;font-weight:600;color:var(--ink);white-space:nowrap;
    text-shadow:0 0 3px var(--parch),0 0 3px var(--parch),0 0 3px var(--parch);
    display:none;}
  .atlas-labels .mk .lbl{display:inline;}
  .mk.t-set .glyph{background:#f2e7cb;color:#5a3210;border-color:#5a3210;}
  .mk.t-major .glyph{background:#efe3c6;color:var(--bronze);border-color:var(--bronze);
    width:24px;height:24px;font-size:15px;}
  .mk.t-minor .glyph{background:#efe3c6;color:var(--bronze);border-color:#a98a4c;
    width:18px;height:18px;font-size:11px;}
  .mk.t-water .glyph{background:#d8e4e6;color:var(--water);border-color:var(--water);}
  .mk.t-mtn .glyph{background:#e6ddc9;color:#6a4a24;border-color:#6a4a24;}
  .mk.t-major .lbl{font-size:14px;}
  .mk.t-water .lbl{color:#2e5060;font-style:italic;}
  /* glyphs step up one notch at the closest tier */
  .map-tier-c .mk .glyph{transform:scale(1.14);}
  .map-tier-c .mk .glyph:hover{transform:scale(1.3);}

  /* hover name tooltip (only when atlas labels are off) */
  .mk-tip{font-family:'EB Garamond',serif;font-size:13px;font-weight:600;
    background:var(--panel);border:1px solid var(--line2);color:var(--ink);
    padding:1px 8px;border-radius:3px;box-shadow:0 2px 6px rgba(0,0,0,.25);}
  .mk-tip:before{display:none;}
  .atlas-labels .mk-tip{display:none;}

  /* route waypoints */
  .wp{display:flex;align-items:center;justify-content:center;
    width:20px;height:20px;border-radius:50%;background:var(--rust);color:#f5ecd6;
    font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;
    border:1.5px solid #f5ecd6;box-shadow:0 1px 4px rgba(0,0,0,.45);cursor:pointer;
    transition:transform .15s ease;}
  .wp:hover{transform:scale(1.18);}
  .route-line{stroke-dasharray:10 14;}
  .route-line.playing{animation:dashmove 2.6s linear infinite;}
  @keyframes dashmove{to{stroke-dashoffset:-240;}}

  /* ---- tier panes (fade reveal) ---- */
  .leaflet-pMajor-pane,.leaflet-pWater-pane,.leaflet-pSettle-pane,.leaflet-pMtn-pane,
  .leaflet-pMinor-pane,.leaflet-pRealm-pane,.leaflet-pRouteLine-pane,.leaflet-pRouteWp-pane{
    transition:opacity .2s ease;}
  /* tier A (z0-1): major regions + seas only */
  .map-tier-a .leaflet-pSettle-pane,.map-tier-a .leaflet-pMtn-pane,
  .map-tier-a .leaflet-pRealm-pane,.map-tier-a .leaflet-pMinor-pane,
  .map-tier-a .leaflet-pRouteLine-pane,.map-tier-a .leaflet-pRouteWp-pane{
    opacity:0;pointer-events:none;}
  /* tier B (z2-3): + settlements, mountains, realm fills, route line */
  .map-tier-b .leaflet-pMinor-pane,.map-tier-b .leaflet-pRouteWp-pane{
    opacity:0;pointer-events:none;}
  /* tier C (z4+): everything */

  /* ---- side panel drawer ---- */
  #panel{position:absolute;top:0;left:0;bottom:0;width:340px;max-width:86vw;
    background:linear-gradient(180deg,var(--panel),var(--panel2));
    border-right:2px solid var(--line2);box-shadow:6px 0 22px rgba(44,36,24,.35);
    transform:translateX(-104%);transition:transform .28s cubic-bezier(.4,0,.2,1);
    z-index:1100;display:flex;flex-direction:column;}
  #panel.open{transform:translateX(0);}
  .panel-close{position:absolute;top:9px;right:11px;z-index:3;border:1px solid var(--line2);
    background:var(--parch2);color:var(--ink);width:30px;height:30px;border-radius:50%;
    font-size:19px;line-height:1;cursor:pointer;font-family:'EB Garamond',serif;}
  .panel-close:hover{background:var(--rust);color:#f5ecd6;border-color:var(--rust);}
  .panel-body{overflow-y:auto;padding:18px 20px 44px;flex:1 1 auto;}
  .panel-open .leaflet-top.leaflet-left{margin-left:346px;transition:margin .28s;}

  .card-type{font-family:'IBM Plex Mono',monospace;font-size:10px;text-transform:uppercase;
    letter-spacing:1.2px;color:#f5ecd6;background:var(--bronze);display:inline-block;
    padding:3px 9px;border-radius:3px;margin-bottom:9px;}
  .card-name{font-family:'EB Garamond',serif;font-size:30px;font-weight:600;
    margin:2px 40px 12px 0;line-height:1.06;color:var(--ink);}
  .card-sess{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);
    text-transform:uppercase;letter-spacing:.6px;margin:-4px 0 12px;}
  .card-lore{font-family:'Lora',serif;font-size:14.5px;line-height:1.62;color:var(--ink2);}
  .card-lore p{margin:0 0 11px;}
  .card-lore h4{font-family:'EB Garamond',serif;font-size:16.5px;color:var(--ink);
    margin:16px 0 5px;letter-spacing:.2px;font-weight:600;}
  .card-wiki{display:inline-block;margin:8px 0 2px;font-family:'EB Garamond',serif;
    font-size:15px;color:var(--rust);font-weight:600;text-decoration:none;}
  .card-wiki:hover{text-decoration:underline;}
  .jrow{display:flex;gap:8px;margin-top:18px;}
  .jbtn{flex:1 1 auto;font-family:'EB Garamond',serif;font-size:14px;padding:8px 10px;
    cursor:pointer;background:var(--parch2);border:1px solid var(--line2);border-radius:5px;
    color:var(--ink);}
  .jbtn:hover:not(:disabled){background:var(--rust);color:#f5ecd6;border-color:var(--rust);}
  .jbtn:disabled{opacity:.4;cursor:default;}
  .jbtn.stop{flex:0 0 auto;}

  /* ---- reviews ---- */
  .rev-h{font-family:'EB Garamond',serif;font-size:15px;margin:18px 0 6px;
    padding-top:10px;border-top:1px solid var(--line);color:var(--muted);
    text-transform:uppercase;letter-spacing:1px;}
  .rev{margin:8px 0;padding:7px 9px;background:var(--parch2);border-radius:5px;
    border:1px solid rgba(199,181,140,.7);}
  .rev .top{display:flex;justify-content:space-between;align-items:baseline;gap:6px;}
  .rev .who{font-weight:600;font-size:13px;}
  .rev .stars{font-size:13px;letter-spacing:1px;color:var(--bronze);white-space:nowrap;}
  .rev .stars .off{color:#c3b088;}
  .rev .when{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);}
  .rev .txt{font-size:12.5px;color:var(--ink2);margin-top:3px;font-style:italic;}

  /* ---- era switcher control ---- */
  .era-ctrl{background:linear-gradient(180deg,var(--panel),var(--panel2));
    border:1px solid var(--line2);border-radius:6px;padding:8px 11px;
    box-shadow:0 4px 14px rgba(44,36,24,.3);font-family:'EB Garamond',serif;
    color:var(--ink);max-width:236px;}
  .era-title{font-size:12.5px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;
    color:var(--muted);margin-bottom:6px;border-bottom:1px solid var(--line);padding-bottom:5px;}
  .era-ctrl label{display:flex;align-items:center;gap:8px;font-size:14px;padding:3px 3px;
    cursor:pointer;border-radius:3px;}
  .era-ctrl label:hover{background:var(--panel2);}
  .era-ctrl input{accent-color:var(--rust);cursor:pointer;margin:0;}

  /* ---- journey control ---- */
  .jrn-ctrl{background:linear-gradient(180deg,var(--panel),var(--panel2));
    border:1px solid var(--line2);border-radius:6px;box-shadow:0 4px 14px rgba(44,36,24,.3);}
  .jrn-ctrl button{font-family:'EB Garamond',serif;font-size:14px;color:var(--ink);
    background:none;border:none;padding:8px 12px;cursor:pointer;white-space:nowrap;
    border-radius:6px;}
  .jrn-ctrl button:hover{background:var(--panel2);}
  .jrn-ctrl button.on{background:var(--rust);color:#f5ecd6;}

  /* ---- scale bar ---- */
  .scalebar{font-family:'IBM Plex Mono',monospace;color:var(--ink);
    background:rgba(243,236,215,.9);border:1px solid var(--line2);border-radius:4px;
    padding:4px 8px 3px;box-shadow:0 2px 8px rgba(44,36,24,.25);}
  .sb-track{display:flex;height:7px;border:1px solid var(--ink2);}
  .sb-seg{height:100%;background:var(--ink2);}
  .sb-seg.alt{background:var(--parch2);}
  .sb-ticks{display:flex;justify-content:space-between;font-size:9.5px;margin-top:2px;
    color:var(--ink2);letter-spacing:.3px;}

  /* leaflet controls parchment skin */
  .leaflet-bar a,.leaflet-control-layers{background:var(--panel);color:var(--ink);
    border-color:var(--line2)!important;}
  .leaflet-bar a{color:var(--ink);}
  .leaflet-bar a:hover{background:var(--panel2);}
  .leaflet-control-layers{font-family:'EB Garamond',serif;font-size:14px;
    box-shadow:0 4px 14px rgba(44,36,24,.3);border-radius:5px;padding:2px;}
  .leaflet-control-layers-toggle{background-color:var(--panel);}
  .leaflet-control-layers label{margin:2px 0;}
  .leaflet-control-attribution{background:rgba(243,236,215,.85)!important;
    font-family:'IBM Plex Mono',monospace;font-size:10px;}
  .realm-tip{font-family:'EB Garamond',serif;font-size:15px;font-weight:600;letter-spacing:.4px;
    background:var(--panel);border:1px solid var(--line2);color:var(--ink);
    padding:3px 11px;border-radius:4px;box-shadow:0 3px 10px rgba(44,36,24,.3);}
  .realm-tip:before{display:none;}
  .leaflet-interactive{cursor:pointer;}

  /* ---- Company origin POIs / trails + faction badges (tier panes) ---- */
  .leaflet-pTrail-pane,.leaflet-pOrigin-pane,.leaflet-pFaction-pane{transition:opacity .2s ease;}
  .map-tier-a .leaflet-pOrigin-pane{opacity:0;pointer-events:none;}
  .map-tier-a .leaflet-pTrail-pane,.map-tier-b .leaflet-pTrail-pane,
  .map-tier-a .leaflet-pFaction-pane,.map-tier-b .leaflet-pFaction-pane{
    opacity:0;pointer-events:none;}
  .mk.t-origin .glyph{color:#f5ecd6;}
  .mk.t-origin .glyph.copulse{animation:copulse 1.3s ease-out 2;}
  @keyframes copulse{0%{box-shadow:0 0 0 0 rgba(138,60,40,.55);}
    100%{box-shadow:0 0 0 15px rgba(138,60,40,0);}}
  .fac-badge{width:22px;height:22px;display:flex;align-items:center;justify-content:center;
    font-size:18px;line-height:1;cursor:pointer;pointer-events:auto;
    text-shadow:0 0 3px var(--parch),0 0 3px var(--parch),0 1px 2px rgba(0,0,0,.4);
    transition:transform .15s ease;}
  .fac-badge:hover{transform:scale(1.22);}
  .trail-line{stroke-dasharray:2 7;}
  .trail-line.emph{stroke-width:2.6px;stroke-dasharray:5 5;}

  /* ---- Company card + Faction card (side panel) ---- */
  .co-head{display:flex;align-items:center;gap:12px;margin:2px 34px 6px 0;}
  .co-mono{flex:0 0 auto;width:46px;height:46px;border-radius:50%;display:flex;
    align-items:center;justify-content:center;font-family:'EB Garamond',serif;
    font-size:19px;font-weight:600;color:#f5ecd6;border:2px solid rgba(44,36,24,.3);
    box-shadow:0 1px 4px rgba(0,0,0,.35);letter-spacing:.5px;}
  .co-h-txt{min-width:0;}
  .co-name{font-family:'EB Garamond',serif;font-size:24px;font-weight:600;
    line-height:1.06;color:var(--ink);}
  .co-epi{font-family:'Lora',serif;font-style:italic;font-size:13.5px;color:var(--muted);
    margin-top:2px;}
  .chip{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:10px;
    text-transform:uppercase;letter-spacing:.8px;padding:2px 8px;border-radius:3px;
    color:#f5ecd6;margin:2px 6px 8px 0;}
  .chip.active,.chip.ally{background:var(--moss);}
  .chip.former,.chip.tension{background:var(--bronze);}
  .chip.dead{background:#7a6a53;}
  .chip.foe{background:var(--rust);}
  .chip.neutral{background:#7a6a53;}
  .chip.kind{background:var(--water);}
  .co-line{font-family:'Lora',serif;font-size:13.5px;color:var(--ink2);margin:10px 0 2px;
    line-height:1.5;}
  .co-link{color:var(--rust);cursor:pointer;font-weight:600;text-decoration:none;}
  .co-link:hover{text-decoration:underline;}
  .co-beat{margin:7px 0;padding:7px 10px 8px;background:var(--parch2);border-radius:5px;
    border-left:3px solid var(--line2);cursor:default;}
  .co-beat[data-beat]{cursor:pointer;}
  .co-beat[data-beat]:hover{border-left-color:var(--rust);background:#efe3c6;}
  .co-beat .bs{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);
    text-transform:uppercase;letter-spacing:.5px;}
  .co-beat .bl{font-family:'EB Garamond',serif;font-weight:600;font-size:14.5px;color:var(--ink);
    margin-top:1px;}
  .co-beat .bn{font-size:12.5px;color:var(--ink2);margin-top:2px;line-height:1.5;}
  .co-gear,.co-disp{margin:5px 0;}
  .co-gear a,.co-disp a{color:var(--rust);text-decoration:none;font-weight:600;
    font-size:14px;cursor:pointer;}
  .co-gear a:hover,.co-disp a:hover{text-decoration:underline;}
  .fac-mem{margin:6px 0;font-size:13.5px;line-height:1.5;}
  .fac-mem .fn{font-weight:600;}
  .fac-mem .fr{color:var(--ink2);}
  .fac-grp{font-family:'IBM Plex Mono',monospace;font-size:10.5px;text-transform:uppercase;
    letter-spacing:1px;color:var(--muted);margin:15px 0 3px;
    border-bottom:1px solid var(--line);padding-bottom:3px;}
  .fac-row{display:flex;align-items:center;gap:9px;padding:7px 8px;margin:2px 0;cursor:pointer;
    border-radius:5px;border:1px solid transparent;}
  .fac-row:hover{background:var(--parch2);border-color:var(--line);}
  .fac-row .sh{font-size:16px;flex:0 0 auto;line-height:1;}
  .fac-row .fnm{font-family:'EB Garamond',serif;font-weight:600;font-size:15.5px;}
  .fac-row .fk{font-size:11px;color:var(--muted);margin-left:auto;font-style:italic;
    text-align:right;}

  /* ---- bottom-left dock: Groups button + Company strip ---- */
  .dock{display:flex;flex-direction:column;gap:6px;align-items:flex-start;margin-bottom:4px;}
  .grp-btn{font-family:'EB Garamond',serif;font-size:14px;color:var(--ink);
    background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line2);
    border-radius:6px;padding:6px 11px;cursor:pointer;box-shadow:0 3px 12px rgba(44,36,24,.28);
    white-space:nowrap;}
  .grp-btn:hover{background:var(--rust);color:#f5ecd6;border-color:var(--rust);}
  .strip{display:flex;align-items:center;gap:5px;flex-wrap:wrap;
    background:linear-gradient(180deg,var(--panel),var(--panel2));
    border:1px solid var(--line2);border-radius:22px;padding:5px 8px;
    box-shadow:0 3px 12px rgba(44,36,24,.28);max-width:min(78vw,560px);}
  .strip.collapsed .co-chip,.strip.collapsed .strip-lbl{display:none;}
  .strip-toggle{flex:0 0 auto;width:24px;height:24px;border-radius:50%;
    border:1px solid var(--line2);background:var(--parch2);color:var(--ink);cursor:pointer;
    font-size:12px;line-height:1;font-family:'EB Garamond',serif;}
  .strip-toggle:hover{background:var(--rust);color:#f5ecd6;}
  .strip-lbl{font-family:'IBM Plex Mono',monospace;font-size:10px;text-transform:uppercase;
    letter-spacing:.8px;color:var(--muted);margin:0 3px 0 1px;}
  .co-chip{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;
    justify-content:center;font-family:'EB Garamond',serif;font-size:12.5px;font-weight:600;
    color:#f5ecd6;cursor:pointer;border:1.5px solid rgba(245,236,214,.55);
    box-shadow:0 1px 3px rgba(0,0,0,.35);transition:transform .12s ease;letter-spacing:.3px;}
  .co-chip:hover{transform:scale(1.16);}
  .co-chip.dead{opacity:.5;}

  @media (max-width:640px){
    header{padding:6px 10px;gap:8px;}
    header h1{font-size:16px;white-space:normal;flex:1 1 100%;text-align:center;}
    .search-wrap{max-width:none;order:2;flex:1 1 60%;}
    .links{order:3;margin-left:0;}
    .links a{font-size:13px;padding:4px 8px;}
    footer{font-size:11px;}
    #panel{top:auto;left:0;right:0;bottom:0;width:auto;max-width:none;height:64%;
      transform:translateY(104%);border-right:none;border-top:2px solid var(--line2);
      border-radius:16px 16px 0 0;box-shadow:0 -6px 22px rgba(44,36,24,.4);}
    #panel.open{transform:translateY(0);}
    .panel-open .leaflet-top.leaflet-left{margin-left:0;}
    .era-ctrl{max-width:200px;padding:6px 8px;}
    .era-ctrl label{font-size:13px;}
    .strip{max-width:82vw;}
    .grp-btn{font-size:13px;padding:5px 9px;}
    .co-name,.card-name{font-size:22px;}
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>Agrakh Nīmilkad Utheg <span class="em">— the Wide World</span></h1>
    <div class="search-wrap">
      <input id="search" type="text" placeholder="Search places…" autocomplete="off" spellcheck="false"/>
      <div id="suggest"></div>
    </div>
    <div class="links">
      <a href="https://princexizor.ddns.net/" target="_blank" rel="noopener">Wiki&nbsp;↗</a>
      <a href="https://sim.princexizor.ddns.net/" target="_blank" rel="noopener">Sim&nbsp;↗</a>
    </div>
  </header>
  <div id="stage">
    <div id="map"></div>
    <aside id="panel" aria-hidden="true" role="dialog" aria-label="Place details">
      <button id="panelClose" class="panel-close" aria-label="Close panel" title="Close">×</button>
      <div id="panelBody" class="panel-body"></div>
    </aside>
  </div>
  <footer>Atlas by the campaign's cartographer · interactive chart for the Tale of the Allhammers</footer>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
"use strict";
(function(){
  var NZ=4, IMG_W=4390, IMG_H=2188, TILE_W=4608, TILE_H=2304;
  var WIKI_BASE='https://princexizor.ddns.net/';
  var RETINA=!!L.Browser.retina;

  // detectRetina drops each base layer's effective maxZoom by 1 on HiDPI (6→5); the map's
  // maxZoom must match, or zooms 5–6 render over blank parchment (and tierZoom('c') would
  // land there). Cap the map to the deepest zoom the tiles actually render.
  var map=L.map('map',{crs:L.CRS.Simple,minZoom:0,maxZoom:RETINA?5:6,
    zoomControl:true,attributionControl:true,maxBoundsViscosity:1.0,
    zoomSnap:.5,zoomDelta:.5,wheelPxPerZoomLevel:80,wheelDebounceTime:20,
    fadeAnimation:true});
  function px(x,y){return map.unproject([x,y],NZ);}
  var contentBounds=L.latLngBounds(px(0,0),px(IMG_W,IMG_H));
  var tileBounds=L.latLngBounds(px(0,0),px(TILE_W,TILE_H));

  // ---- panes (one per overlay tier; ordering via z-index) ----
  // realms sit below markers; route waypoints above the route line.
  [['pRealm',410],['pTrail',412],['pRouteLine',415],['pWater',618],['pMajor',620],
   ['pMtn',622],['pSettle',624],['pMinor',626],['pOrigin',628],['pFaction',630],
   ['pRouteWp',640]].forEach(function(p){
    map.createPane(p[0]); map.getPane(p[0]).style.zIndex=p[1];
  });

  // ---- base layers: Modern (0..5) / War (0..4) / Imperial (0..4) ----
  // detectRetina bumps the requested URL zoom by 1 on HiDPI, so cap maxNativeZoom
  // one below the deepest on-disk zoom on retina to avoid 404 tiles at max zoom.
  var ATTR='Agrakh Nīmilkad Utheg · the Tale of the Allhammers';
  function makeBase(path,deepZoom){
    return L.tileLayer(path+'{z}/{x}/{y}.jpg',{
      minNativeZoom:0,maxNativeZoom:RETINA?deepZoom-1:deepZoom,maxZoom:6,
      tileSize:256,noWrap:true,bounds:tileBounds,detectRetina:true,keepBuffer:4,
      attribution:ATTR});
  }
  var BASES={
    modern:makeBase('tiles/',5),
    war:makeBase('tiles-war/',4),
    imperial:makeBase('tiles-imperial/',4)
  };
  var curBase=BASES.modern; curBase.addTo(map);
  var eraInputs=null;
  function setEra(k){
    if(!BASES[k]||BASES[k]===curBase)return;
    map.removeLayer(curBase); curBase=BASES[k]; curBase.addTo(map);
    if(eraInputs)Array.prototype.forEach.call(eraInputs,function(i){i.checked=(i.value===k);});
  }

  // ---- initial view: vertical-lock so the atlas ALWAYS fills the height ----
  // minZoom is the smallest z with (IMG_H·2^(z−NZ)) ≥ viewport height, snapped up
  // to zoomSnap; below it parchment void would show above/below. Horizontal panning
  // stays free inside maxBounds (Google-Maps side-scroll feel). fitZoom feeds the
  // tier system (tierZoom/tierFor/revealZoom), so the reveal tiers ride on it.
  function fillZoom(){
    var vh=map.getSize().y||map.getContainer().clientHeight||IMG_H;
    var z=NZ+Math.log(vh/IMG_H)/Math.LN2;   // IMG_H·2^(z−NZ) = vh
    var snap=map.options.zoomSnap||0.5;
    return Math.ceil(z/snap)*snap;
  }
  var EPESHU=[1222,1404];                   // Leponnia/Epēshu — initial centre
  var fitZoom=fillZoom();
  map.setMinZoom(fitZoom);
  map.setMaxBounds(contentBounds);          // exact atlas rectangle, viscosity 1.0
  map.setView(px(EPESHU[0],EPESHU[1]),fitZoom,{animate:false});
  map.panInsideBounds(contentBounds,{animate:false});  // close the 1px clamp seam
  // keep it filled across viewport resizes (never leave void at min zoom)
  var _rzT;
  window.addEventListener('resize',function(){
    clearTimeout(_rzT);
    _rzT=setTimeout(function(){
      map.invalidateSize({animate:false});
      fitZoom=fillZoom(); map.setMinZoom(fitZoom);
      if(map.getZoom()<fitZoom)map.setView(px(EPESHU[0],EPESHU[1]),fitZoom,{animate:false});
      updScale(); updTier();
    },180);
  });

  // ---- helpers ----
  function esc(s){return String(s==null?'':s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');}
  function fold(s){return String(s||'').normalize('NFD')
    .replace(/[̀-ͯ]/g,'').toLowerCase().trim();}
  function stars(n){n=Math.max(0,Math.min(5,n|0));var o='';
    for(var i=0;i<5;i++)o+=i<n?'★':'<span class="off">★</span>';return o;}

  // ---- centripetal Catmull-Rom (alpha=.5): smooth curve through control points
  // without the overshoot uniform CR gives on the widely-spread sea legs. Endpoints
  // are duplicated so the curve starts/ends exactly on the first/last point. Used by
  // both the campaign route (per leg) and the Company origin trails.
  function crSpline(pts,seg){
    if(!pts||pts.length<3)return (pts||[]).slice();
    function d(a,b){return Math.pow(Math.max(1e-6,Math.hypot(b[0]-a[0],b[1]-a[1])),0.5);}
    var out=[pts[0].slice?pts[0].slice():[pts[0][0],pts[0][1]]];
    for(var i=0;i<pts.length-1;i++){
      var p0=pts[i-1]||pts[i],p1=pts[i],p2=pts[i+1],p3=pts[i+2]||pts[i+1];
      var t0=0,t1=t0+d(p0,p1),t2=t1+d(p1,p2),t3=t2+d(p2,p3);
      for(var k=1;k<=seg;k++){
        var t=t1+(t2-t1)*k/seg;
        var a1x=(t1-t)/(t1-t0)*p0[0]+(t-t0)/(t1-t0)*p1[0],
            a1y=(t1-t)/(t1-t0)*p0[1]+(t-t0)/(t1-t0)*p1[1],
            a2x=(t2-t)/(t2-t1)*p1[0]+(t-t1)/(t2-t1)*p2[0],
            a2y=(t2-t)/(t2-t1)*p1[1]+(t-t1)/(t2-t1)*p2[1],
            a3x=(t3-t)/(t3-t2)*p2[0]+(t-t2)/(t3-t2)*p3[0],
            a3y=(t3-t)/(t3-t2)*p2[1]+(t-t2)/(t3-t2)*p3[1],
            b1x=(t2-t)/(t2-t1)*a1x+(t-t1)/(t2-t1)*a2x,
            b1y=(t2-t)/(t2-t1)*a1y+(t-t1)/(t2-t1)*a2y,
            b2x=(t3-t)/(t3-t2)*a2x+(t-t2)/(t3-t2)*a3x,
            b2y=(t3-t)/(t3-t2)*a2y+(t-t2)/(t3-t2)*a3y;
        out.push([(t2-t)/(t2-t1)*b1x+(t-t1)/(t2-t1)*b2x,
                  (t2-t)/(t2-t1)*b1y+(t-t1)/(t2-t1)*b2y]);
      }
    }
    return out;
  }

  // ---- clean a wiki page body into readable paragraphs (full text) ----
  var META=/^(General Information|People and History|Other Names|Location|Type|Inhabitants|Events|Regions|Map|Footnotes|See Session)/;
  function cleanWiki(content,name){
    if(!content)return '';
    var lines=content.replace(/\r/g,'').split('\n'), arr=[], fn=fold(name||'');
    for(var i=0;i<lines.length;i++){
      var t=lines[i].replace(/\s+/g,' ').trim();
      if(!t)continue;
      if(META.test(t))continue;
      if(t==='↩'||/^\d+$/.test(t))continue;
      if(fn&&arr.length===0&&fold(t)===fn)continue; // repeated title at top
      arr.push(t);
    }
    var html='';
    for(var j=0;j<arr.length;j++){
      var s=arr[j];
      var heading=s.length<=34&&!/[.!?,;:]$/.test(s)&&!/[.!?]/.test(s)&&j<arr.length-1;
      html+=heading?'<h4>'+esc(s)+'</h4>':'<p>'+esc(s)+'</p>';
    }
    return html;
  }

  // ---- season ranking for "newest first" reviews ----
  var PHASE={early:0,mid:1,late:2};
  var SEASON={spring:0,summer:1,autumn:2,fall:2,winter:3};
  function chron(r){
    var y=0,m=(String(r.date||'').match(/(\d{3,4})/));if(m)y=+m[1];
    var d=fold(r.date), ph=1, se=0;
    for(var k in PHASE)if(d.indexOf(k)>=0)ph=PHASE[k];
    for(var s in SEASON)if(d.indexOf(s)>=0)se=SEASON[s];
    return y*1000 + (se*3+ph)*10 + (r.session||0);
  }
  function reviewsHtml(name){
    var rv=REVIEWS[name];
    if(!rv||!rv.length)return '';
    var sorted=rv.slice().sort(function(a,b){return chron(b)-chron(a);});
    var h='<div class="rev-h">Traveller’s Reviews</div>';
    for(var i=0;i<sorted.length;i++){var r=sorted[i];
      h+='<div class="rev"><div class="top">'+
        '<span class="who">'+esc(r.reviewer)+'</span>'+
        '<span class="stars">'+stars(r.stars)+'</span></div>'+
        '<div class="when">'+esc(r.date)+'</div>'+
        '<div class="txt">“'+esc(r.text)+'”</div></div>';
    }
    return h;
  }

  // ---- state ----
  var MARKERS=[], MREF={}, WIKI={}, WIKIFOLD={}, REVIEWS={}, ROUTE=[];
  var routePoly=null;
  var PARTY=[], FACTIONS=[], PMREF={}, FMREF={};
  var companyTrails=null, layersCtrl=null;

  function pageFor(name){
    if(WIKI[name])return WIKI[name];
    var f=fold(name);
    if(WIKIFOLD[f])return WIKIFOLD[f];
    for(var t in WIKI){if(fold(t).indexOf(f)>=0||f.indexOf(fold(t))>=0)return WIKI[t];}
    return null;
  }
  function wikiUrl(page){return WIKI_BASE+page.slug.split('/').map(encodeURIComponent).join('/');}

  // ---- side panel ----
  var panel=document.getElementById('panel'),
      panelBody=document.getElementById('panelBody'),
      stage=document.getElementById('stage');
  document.getElementById('panelClose').addEventListener('click',closePanel);
  function showPanel(html){
    panelBody.innerHTML=html; panelBody.scrollTop=0;
    panel.classList.add('open'); stage.classList.add('panel-open');
    panel.setAttribute('aria-hidden','false');
  }
  function closePanel(){
    panel.classList.remove('open'); stage.classList.remove('panel-open');
    panel.setAttribute('aria-hidden','true');
    stopJourney();
    history.replaceState(null,'',location.pathname+location.search);
  }
  function setHash(h){history.replaceState(null,'',location.pathname+location.search+h);}

  function openPlace(m){
    var page=pageFor(m.name);
    var h='<span class="card-type">'+esc(m.type||'Place')+'</span>'+
      '<h2 class="card-name">'+esc(m.name)+'</h2>';
    if(page){
      var body=cleanWiki(page.content,m.name);
      h+='<div class="card-lore">'+(body||'<p>The chronicles record only the name.</p>')+'</div>';
      h+='<a class="card-wiki" href="'+esc(wikiUrl(page))+'" target="_blank" rel="noopener">Read on the wiki →</a>';
    }else{
      h+='<div class="card-lore"><p>No chronicle entry recorded for this place.</p></div>';
    }
    h+=reviewsHtml(m.name);
    showPanel(h);
    setHash('#place='+encodeURIComponent(m.name));
  }

  function openRealm(name){
    var bare=name.replace(/^(Kgd\.\s+of|Kingdom\s+of|Once-Realm\s+of|Kgd\.\s+under\s+the)\s+/i,'').trim();
    var page=pageFor(bare)||pageFor(name);
    var h='<span class="card-type">Realm</span>'+
      '<h2 class="card-name">'+esc(name)+'</h2>';
    if(page){
      var body=cleanWiki(page.content,page.title);
      h+='<div class="card-lore">'+(body||'<p>Of this realm the chronicles say little.</p>')+'</div>';
      h+='<a class="card-wiki" href="'+esc(wikiUrl(page))+'" target="_blank" rel="noopener">Read on the wiki →</a>';
    }else{
      h+='<div class="card-lore"><p>Of this realm the chronicles say little.</p></div>';
    }
    showPanel(h);
  }

  function openWaypoint(i){
    if(i<0||i>=ROUTE.length)return;
    var p=ROUTE[i];
    var h='<span class="card-type">Journey · Waypoint '+(i+1)+' of '+ROUTE.length+'</span>'+
      '<h2 class="card-name">'+esc(p.name)+'</h2>'+
      '<div class="card-sess">'+(p.session?'Session '+p.session:'Pre-campaign')+'</div>'+
      '<div class="card-lore"><p>'+esc(p.note||'')+'</p></div>'+
      '<div class="jrow">'+
        '<button class="jbtn" data-j="prev"'+(i<=0?' disabled':'')+'>← Prev</button>'+
        '<button class="jbtn" data-j="next"'+(i>=ROUTE.length-1?' disabled':'')+'>Next →</button>'+
        (jrn.on?'<button class="jbtn stop" data-j="stop">Stop</button>':'')+
      '</div>';
    showPanel(h);
    jrn.i=i;
    Array.prototype.forEach.call(panelBody.querySelectorAll('[data-j]'),function(b){
      b.addEventListener('click',function(){
        var a=b.getAttribute('data-j');
        if(a==='prev')goWaypoint(i-1);
        else if(a==='next')goWaypoint(i+1);
        else stopJourney();
      });
    });
  }
  // walk the route (used by Prev/Next and by journey play-through)
  function goWaypoint(i){
    if(i<0||i>=ROUTE.length)return;
    var p=ROUTE[i];
    map.flyTo(px(p.x,p.y),Math.max(map.getZoom(),tierZoom('c')),{duration:1.2,easeLinearity:.25});
    openWaypoint(i);
  }

  // ---- markers ----
  var TYPE_STYLE={
    'Settlements':{cls:'t-set',g:'⌂',pane:'pSettle'},
    'Major Regions':{cls:'t-major',g:'✦',pane:'pMajor'},
    'Minor Regions':{cls:'t-minor',g:'◆',pane:'pMinor'},
    'Bodies of Water':{cls:'t-water',g:'≈',pane:'pWater'},
    'Mountains and Hills':{cls:'t-mtn',g:'▲',pane:'pMtn'}
  };
  var LAYERS={};

  // tier boundary zooms, relative to the (viewport-dependent) fit zoom so tiers
  // A/B/C are all reachable within [minZoom,maxZoom]; the fit view sits in tier A
  // and the range up to maxZoom is split into thirds.
  function tierZoom(t){
    var range=map.getMaxZoom()-fitZoom;
    if(range<=0)return fitZoom;
    return t==='c'?fitZoom+2*range/3:t==='b'?fitZoom+range/3:fitZoom;
  }
  function revealZoom(type){
    // broad features read at tier B; points reveal fully (labels + waypoints) at tier C
    var t=(type==='Major Regions'||type==='Bodies of Water')?'b':'c';
    return Math.max(map.getZoom(),tierZoom(t));
  }
  function flyToMarker(m){
    map.flyTo(m._mk.getLatLng(),revealZoom(m.type),{duration:.9,easeLinearity:.25});
  }

  function buildMarkers(data){
    MARKERS=data;
    data.forEach(function(m){
      var st=TYPE_STYLE[m.type]||{cls:'t-minor',g:'•',pane:'pMinor'};
      var icon=L.divIcon({className:'',iconSize:null,iconAnchor:[11,11],
        html:'<div class="mk '+st.cls+'"><span class="glyph">'+st.g+'</span>'+
             '<span class="lbl">'+esc(m.name)+'</span></div>'});
      var mk=L.marker(px(m.x,m.y),{icon:icon,title:m.name,pane:st.pane,riseOnHover:true});
      mk.bindTooltip(esc(m.name),{direction:'right',offset:[12,0],className:'mk-tip',opacity:1});
      mk.on('click',function(){openPlace(m);});
      m._mk=mk; MREF[fold(m.name)]=m;
      if(!LAYERS[m.type])LAYERS[m.type]=L.layerGroup();
      LAYERS[m.type].addLayer(mk);
    });
  }

  function buildRoute(pts){
    if(!pts||!pts.length)return null;
    ROUTE=pts;
    var g=L.layerGroup();
    // each leg is its own centripetal spline through [prev, ...via, current]; legs
    // are concatenated but NOT smoothed across waypoints (stops stay sharp corners).
    var latlngs=[];
    for(var li=1;li<pts.length;li++){
      var ctrl=[[pts[li-1].x,pts[li-1].y]];
      (pts[li].via||[]).forEach(function(v){ctrl.push([v[0],v[1]]);});
      ctrl.push([pts[li].x,pts[li].y]);
      var seg=crSpline(ctrl,18);
      for(var k=(li===1?0:1);k<seg.length;k++)latlngs.push(px(seg[k][0],seg[k][1]));
    }
    routePoly=L.polyline(latlngs,{className:'route-line',color:'#8a3c28',weight:3,
      opacity:.85,dashArray:'10 14',lineJoin:'round',pane:'pRouteLine'}).addTo(g);
    pts.forEach(function(p,i){
      var ic=L.divIcon({className:'',iconSize:[20,20],iconAnchor:[10,10],
        html:'<div class="wp">'+(i+1)+'</div>'});
      var wp=L.marker(px(p.x,p.y),{icon:ic,title:p.name,pane:'pRouteWp'});
      wp.on('click',function(){openWaypoint(i);});
      g.addLayer(wp);
    });
    return g;
  }

  function buildRealms(gj){
    if(!gj||!gj.features||!gj.features.length)return null;
    var g=L.layerGroup();
    gj.features.forEach(function(f){
      var col=(f.properties&&f.properties.color)||'#8a6224';
      var name=(f.properties&&f.properties.name)||'';
      var geom=f.geometry;if(!geom)return;
      var polys=geom.type==='MultiPolygon'?geom.coordinates:
                geom.type==='Polygon'?[geom.coordinates]:[];
      polys.forEach(function(rings){
        var latlngs=rings.map(function(ring){
          return ring.map(function(c){return px(c[0],c[1]);});
        });
        var poly=L.polygon(latlngs,{color:col,weight:1.5,opacity:.7,
          fillColor:col,fillOpacity:.22,pane:'pRealm'});
        if(name)poly.bindTooltip(esc(name),{sticky:true,className:'realm-tip',direction:'top'});
        poly.on('mouseover',function(){poly.setStyle({fillOpacity:.42,weight:2.4});});
        poly.on('mouseout',function(){poly.setStyle({fillOpacity:.22,weight:1.5});});
        poly.on('click',function(){openRealm(name);});
        g.addLayer(poly);
      });
    });
    return g;
  }

  // ================= The Company (spec P) + Groups & Powers (spec AC) =================
  function mono(name){var w=String(name||'').trim().split(/\s+/);
    return ((w[0]?w[0][0]:'?')+(w[1]?w[1][0]:'')).toUpperCase();}
  function slugUrl(s){return WIKI_BASE+String(s).split('/').map(encodeURIComponent).join('/');}
  function flyTo(x,y,t){map.flyTo(px(x,y),Math.max(map.getZoom(),tierZoom(t||'c')),
    {duration:.9,easeLinearity:.25});}
  function alignColor(a){return a==='ally'?'#5a6b34':a==='foe'?'#8a3c28':
    a==='tension'?'#8a6224':'#7a6a53';}

  // a road beat / dispatch place → native coords (reuse route waypoint or marker px)
  function placeCoords(label){
    var f=fold(label),i;
    for(i=0;i<ROUTE.length;i++)if(fold(ROUTE[i].name)===f)return {x:ROUTE[i].x,y:ROUTE[i].y};
    if(MREF[f])return {x:MREF[f].x,y:MREF[f].y};
    for(i=0;i<ROUTE.length;i++){var rn=fold(ROUTE[i].name);
      if(f.indexOf(rn)>=0||rn.indexOf(f)>=0)return {x:ROUTE[i].x,y:ROUTE[i].y};}
    return null;
  }
  function dispatchesFor(name){var f=fold(name),seen={},out=[];
    for(var pl in REVIEWS)REVIEWS[pl].forEach(function(r){
      if(fold(r.reviewer)===f&&!seen[pl]){seen[pl]=1;out.push(pl);}});
    return out;
  }
  function openPlaceByName(name){var m=MREF[fold(name)];
    if(m){flyToMarker(m);openPlace(m);}else openPlace({name:name});}

  // ---- Company card (experiment B) ----
  var STATUS_LABEL={active:'Active member',former:'Former member',dead:'Fallen'};
  function openCompanyByName(n,f){var p=PMREF[fold(n)];if(p){openCompany(p,f);return true;}return false;}
  function openCompany(p,doFly){
    var h='<span class="card-type">The Company · '+esc(STATUS_LABEL[p.status]||p.status)+'</span>';
    h+='<div class="co-head"><div class="co-mono" style="background:'+esc(p.color)+'">'+
       esc(mono(p.name))+'</div><div class="co-h-txt"><div class="co-name">'+esc(p.name)+'</div>'+
       (p.epithet?'<div class="co-epi">'+esc(p.epithet)+'</div>':'')+'</div></div>';
    h+='<div><span class="chip '+esc(p.status)+'">'+esc(p.status)+'</span>'+
       (p.race?'<span class="chip kind">'+esc(p.race)+'</span>':'')+'</div>';
    if(p.origin){
      h+='<div class="co-line">'+(p.status==='former'?'Haunt: ':'Home: ')+esc(p.origin.label)+
         (p.origin.approx?' (approx.)':'')+' — <a class="co-link" data-fly="1">show on the map ↗</a></div>';
    }
    h+='<div class="card-lore">'+p.bio.map(function(b){return '<p>'+esc(b)+'</p>';}).join('')+'</div>';
    if(p.road&&p.road.length){
      h+='<h4>Their road so far</h4>';
      p.road.forEach(function(b,i){var c=placeCoords(b.label);
        h+='<div class="co-beat"'+(c?' data-beat="'+i+'"':'')+'><div class="bs">Session '+
          esc(b.session)+(c?'  ·  fly ↗':'')+'</div><div class="bl">'+esc(b.label)+
          '</div><div class="bn">'+esc(b.note)+'</div></div>';});
    }
    if(p.gear&&p.gear.length){h+='<h4>Gear</h4>';
      p.gear.forEach(function(gr){h+='<div class="co-gear"><a href="'+esc(slugUrl(gr.wikiSlug))+
        '" target="_blank" rel="noopener">'+esc(gr.name)+' ↗</a></div>';});}
    var disp=dispatchesFor(p.name);
    if(disp.length){h+='<h4>Dispatches</h4>';
      disp.forEach(function(pl){h+='<div class="co-disp"><a data-disp="'+esc(pl)+
        '">'+esc(pl)+' — Traveller’s Reviews →</a></div>';});}
    if(p.wikiSlug)h+='<a class="card-wiki" href="'+esc(slugUrl(p.wikiSlug))+
      '" target="_blank" rel="noopener">Read on the wiki →</a>';
    showPanel(h);
    setHash('#company='+encodeURIComponent(p.name));
    Array.prototype.forEach.call(panelBody.querySelectorAll('[data-fly],[data-beat],[data-disp]'),
      function(el){el.addEventListener('click',function(){
        if(el.hasAttribute('data-fly')){if(p.origin)flyTo(p.origin.x,p.origin.y,'c');}
        else if(el.hasAttribute('data-beat')){var c=placeCoords(p.road[+el.getAttribute('data-beat')].label);if(c)flyTo(c.x,c.y,'c');}
        else if(el.hasAttribute('data-disp'))openPlaceByName(el.getAttribute('data-disp'));
      });});
    if(doFly&&p.origin)flyTo(p.origin.x,p.origin.y,'c');
  }

  // ---- Faction card + list (spec AC #2) ----
  var ALIGN_ORDER=['ally','tension','neutral','foe'];
  var ALIGN_LABEL={ally:'Allies',tension:'Uneasy — watch closely',neutral:'Neutral parties',foe:'Foes'};
  function openFactionByName(n,f){var x=FMREF[fold(n)];if(x){openFaction(x,f);return true;}return false;}
  function openFaction(f,doFly){
    var h='<span class="card-type">Group · '+esc(f.kind)+'</span>'+
      '<h2 class="card-name">'+esc(f.name)+'</h2>'+
      '<div><span class="chip '+esc(f.alignment)+'">'+esc(f.alignment)+'</span></div>'+
      '<div class="card-lore">'+f.summary.map(function(s){return '<p>'+esc(s)+'</p>';}).join('')+'</div>';
    if(f.seat)h+='<div class="co-line">Seat: '+esc(f.seat.label)+
      ' — <a class="co-link" data-seat="1">show on the map ↗</a></div>';
    if(f.members&&f.members.length){h+='<h4>Known members</h4>';
      f.members.forEach(function(mb){
        var link=mb.company&&PMREF[fold(mb.name)];
        h+='<div class="fac-mem"><span class="fn">'+
          (link?'<a class="co-link" data-mem="'+esc(mb.name)+'">'+esc(mb.name)+'</a>':esc(mb.name))+
          '</span><span class="fr">— '+esc(mb.role)+'</span></div>';});}
    if(f.wikiSlug)h+='<a class="card-wiki" href="'+esc(slugUrl(f.wikiSlug))+
      '" target="_blank" rel="noopener">Read on the wiki →</a>';
    if(f.sessions&&f.sessions.length)
      h+='<div class="card-sess" style="margin-top:14px">Seen in sessions '+esc(f.sessions.join(', '))+'</div>';
    showPanel(h);
    setHash('#faction='+encodeURIComponent(f.name));
    Array.prototype.forEach.call(panelBody.querySelectorAll('[data-seat],[data-mem]'),
      function(el){el.addEventListener('click',function(){
        if(el.hasAttribute('data-seat')){if(f.seat)flyTo(f.seat.x,f.seat.y,'c');}
        else openCompanyByName(el.getAttribute('data-mem'),true);
      });});
    if(doFly&&f.seat)flyTo(f.seat.x,f.seat.y,'c');
  }
  function openFactionsList(){
    var h='<span class="card-type">Atlas</span><h2 class="card-name">Groups &amp; Powers</h2>'+
      '<div class="card-lore" style="margin-bottom:2px"><p>The factions, orders, and powers '+
      'the company has come to know across the Wide World.</p></div>';
    ALIGN_ORDER.forEach(function(al){
      var grp=FACTIONS.filter(function(f){return f.alignment===al;});
      if(!grp.length)return;
      h+='<div class="fac-grp">'+esc(ALIGN_LABEL[al])+'</div>';
      grp.forEach(function(f){h+='<div class="fac-row" data-fac="'+esc(f.name)+'">'+
        '<span class="sh" style="color:'+alignColor(al)+'">⛊</span>'+
        '<span class="fnm">'+esc(f.name)+'</span><span class="fk">'+esc(f.kind)+'</span></div>';});
    });
    showPanel(h);
    Array.prototype.forEach.call(panelBody.querySelectorAll('[data-fac]'),function(el){
      el.addEventListener('click',function(){openFactionByName(el.getAttribute('data-fac'),true);});});
  }

  // ---- Origin POIs (experiment A) ----
  function buildOrigins(){
    var g=L.layerGroup();
    PARTY.forEach(function(p){
      if(!p.origin)return;
      var lbl=(p.status==='former'?'Haunt of ':'Hometown of ')+p.name;
      var icon=L.divIcon({className:'',iconSize:null,iconAnchor:[11,11],
        html:'<div class="mk t-origin"><span class="glyph" style="background:'+esc(p.color)+
          ';color:#f5ecd6;border-color:rgba(44,36,24,.6)">⚑</span>'+
          '<span class="lbl">'+esc(lbl)+'</span></div>'});
      var mk=L.marker(px(p.origin.x,p.origin.y),{icon:icon,title:lbl,pane:'pOrigin',riseOnHover:true});
      mk.bindTooltip(esc(lbl),{direction:'right',offset:[12,0],className:'mk-tip',opacity:1});
      mk.on('click',function(){openCompany(p,false);});
      p._omk=mk; g.addLayer(mk);
    });
    return g;
  }
  // ---- Origin trails (experiment C): quadratic-bowed dotted line origin→joined ----
  function buildTrails(){
    var g=L.layerGroup();
    PARTY.forEach(function(p){
      if(p.status!=='active'||!p.origin||!p.joined)return;
      var o=p.origin,j=p.joined,mx=(o.x+j.x)/2,my=(o.y+j.y)/2,
          dx=j.x-o.x,dy=j.y-o.y,len=Math.hypot(dx,dy)||1,off=len*0.13;
      var pts=crSpline([[o.x,o.y],[mx-dy/len*off,my+dx/len*off],[j.x,j.y]],20)
        .map(function(c){return px(c[0],c[1]);});
      var line=L.polyline(pts,{className:'trail-line',color:p.color,weight:1.5,opacity:.5,
        dashArray:'2 7',lineJoin:'round',pane:'pTrail'});
      line.bindTooltip('the road that brought them (conjectural)',
        {sticky:true,className:'realm-tip',direction:'top'});
      p._trail=line; g.addLayer(line);
    });
    return g;
  }
  // ---- Faction seat badges (spec AC #2) ----
  function buildFactionBadges(){
    var g=L.layerGroup(), seen={};
    FACTIONS.forEach(function(f){
      if(!f.seat)return;
      var key=f.seat.x+','+f.seat.y,n=seen[key]||0; seen[key]=n+1;
      var ox=0,oy=0;                          // spread badges that share a seat
      if(n){var ang=(n-1)*2.3999+0.5;ox=Math.cos(ang)*14;oy=Math.sin(ang)*14;}
      var icon=L.divIcon({className:'',iconSize:[22,22],iconAnchor:[11,11],
        html:'<div class="fac-badge" style="color:'+alignColor(f.alignment)+'">⛊</div>'});
      var mk=L.marker(px(f.seat.x+ox,f.seat.y+oy),
        {icon:icon,title:f.name,pane:'pFaction',riseOnHover:true});
      mk.bindTooltip(esc(f.name),{direction:'right',offset:[11,0],className:'mk-tip',opacity:1});
      mk.on('click',(function(ff){return function(){openFaction(ff,false);};})(f));
      g.addLayer(mk);
    });
    return g;
  }

  // ---- The Company strip (experiment D) + Groups button, docked bottom-left ----
  var stripEl=null;
  function showStrip(on){if(stripEl)stripEl.style.display=on?'':'none';}
  function stripClick(p){
    openCompany(p,!!p.origin);
    if(p._omk&&p._omk._icon){var gl=p._omk._icon.querySelector('.glyph');
      if(gl){gl.classList.remove('copulse');void gl.offsetWidth;gl.classList.add('copulse');
        setTimeout(function(){gl.classList.remove('copulse');},2700);}}
    if(p._trail&&companyTrails&&map.hasLayer(companyTrails)){
      var el=p._trail.getElement&&p._trail.getElement();
      if(el){el.classList.add('emph');setTimeout(function(){el.classList.remove('emph');},1900);}}
  }
  function addCompanyDock(){
    var C=L.Control.extend({options:{position:'bottomleft'},onAdd:function(){
      var d=L.DomUtil.create('div','dock');
      var gb=L.DomUtil.create('button','grp-btn',d);
      gb.type='button'; gb.innerHTML='⛊ Groups &amp; Powers';
      gb.addEventListener('click',openFactionsList);
      stripEl=L.DomUtil.create('div','strip',d);
      var tg=L.DomUtil.create('button','strip-toggle',stripEl);
      tg.type='button'; tg.textContent='⚑'; tg.title='Collapse the Company';
      tg.addEventListener('click',function(){stripEl.classList.toggle('collapsed');
        tg.title=stripEl.classList.contains('collapsed')?'Show the Company':'Collapse the Company';});
      var lb=L.DomUtil.create('span','strip-lbl',stripEl); lb.textContent='The Company';
      PARTY.forEach(function(p){
        var c=L.DomUtil.create('div','co-chip'+(p.status==='dead'?' dead':''),stripEl);
        c.style.background=p.color; c.textContent=mono(p.name);
        c.title=p.name+(p.epithet?' — '+p.epithet:'');
        c.addEventListener('click',function(){stripClick(p);});
      });
      L.DomEvent.disableClickPropagation(d);
      L.DomEvent.disableScrollPropagation(d);
      return d;
    }});
    map.addControl(new C());
  }

  // ---- journey play-through ----
  var jrn={on:false,i:0};
  function setRoutePlaying(on){
    if(!routePoly)return;
    var el=routePoly.getElement&&routePoly.getElement();
    if(el)el.classList.toggle('playing',on);
  }
  function startJourney(){
    if(!ROUTE.length)return;
    jrn.on=true; setRoutePlaying(true); jrnBtn.classList.add('on');
    goWaypoint(0);
  }
  function stopJourney(){
    if(!jrn.on)return;
    jrn.on=false; setRoutePlaying(false); jrnBtn.classList.remove('on');
  }

  // ---- controls ----
  var jrnBtn; // set when journey control added
  function addEraControl(){
    var C=L.Control.extend({options:{position:'topright'},
      onAdd:function(){
        var d=L.DomUtil.create('div','era-ctrl');
        d.setAttribute('role','radiogroup');
        d.setAttribute('aria-label','The Atlas Through the Ages');
        d.innerHTML='<div class="era-title">The Atlas Through the Ages</div>'+
          '<label><input type="radio" name="era" value="modern" autocomplete="off"> Modern (1374 A.B.)</label>'+
          '<label><input type="radio" name="era" value="war" autocomplete="off"> War of the Patrons (1124–1133)</label>'+
          '<label><input type="radio" name="era" value="imperial" autocomplete="off"> Imperial (the golden age)</label>';
        L.DomEvent.disableClickPropagation(d);
        L.DomEvent.disableScrollPropagation(d);
        d.addEventListener('change',function(e){
          if(e.target&&e.target.name==='era')setEra(e.target.value);
        });
        // force the default regardless of browser form-state restoration
        d.querySelector('input[value="modern"]').checked=true;
        eraInputs=d.querySelectorAll('input[name=era]');
        return d;
      }});
    map.addControl(new C());
  }
  function addJourneyControl(){
    var C=L.Control.extend({options:{position:'topright'},
      onAdd:function(){
        var d=L.DomUtil.create('div','jrn-ctrl');
        jrnBtn=L.DomUtil.create('button','',d);
        jrnBtn.type='button'; jrnBtn.textContent='⚑ Follow the journey';
        L.DomEvent.disableClickPropagation(d);
        jrnBtn.addEventListener('click',function(){
          if(jrn.on)stopJourney(); else startJourney();
        });
        return d;
      }});
    map.addControl(new C());
  }

  // ---- scale bar (Cyrikon miles) ----
  var MI_PER_NATIVE=600/723; // 600 Imperial (Cyrikon) mi ≈ 723 native px
  var scaleEl=null;
  function addScaleControl(){
    var C=L.Control.extend({options:{position:'bottomleft'},
      onAdd:function(){scaleEl=L.DomUtil.create('div','scalebar');
        L.DomEvent.disableClickPropagation(scaleEl);return scaleEl;}});
    map.addControl(new C());
  }
  function niceRound(v){
    if(v<=0)return 1;
    var p=Math.pow(10,Math.floor(Math.log10(v))), f=v/p;
    var n=f>=5?5:f>=2.5?2.5:f>=2?2:1;
    return n*p;
  }
  function fmtMi(v){v=Math.round(v);return v>=1000?v.toLocaleString('en-US'):''+v;}
  function updScale(){
    if(!scaleEl)return;
    var a=map.latLngToContainerPoint(px(0,0)),
        b=map.latLngToContainerPoint(px(1000,0));
    var screenPerNative=Math.abs(b.x-a.x)/1000;          // screen px per native px
    if(!screenPerNative){scaleEl.innerHTML='';return;}
    var miPerScreen=MI_PER_NATIVE/screenPerNative;        // miles per screen px
    var nice=niceRound(miPerScreen*112);                  // ~target width
    var w=nice/miPerScreen;
    scaleEl.innerHTML=
      '<div class="sb-track" style="width:'+w.toFixed(0)+'px">'+
        '<div class="sb-seg" style="width:50%"></div>'+
        '<div class="sb-seg alt" style="width:50%"></div>'+
      '</div>'+
      '<div class="sb-ticks" style="width:'+w.toFixed(0)+'px">'+
        '<span>0</span><span>'+fmtMi(nice/2)+'</span><span>'+fmtMi(nice)+' mi</span></div>';
  }

  // ---- search ----
  var searchEl=document.getElementById('search'),
      sugEl=document.getElementById('suggest'), sugIdx=-1, sugItems=[];
  function renderSug(list){
    sugItems=list;sugIdx=-1;
    if(!list.length){sugEl.className='';sugEl.innerHTML='';return;}
    sugEl.innerHTML=list.map(function(m,i){
      return '<div class="sug" data-i="'+i+'"><span>'+esc(m.name)+'</span> '+
        '<span class="st">'+esc(m.type)+'</span></div>';
    }).join('');
    sugEl.className='on';
    Array.prototype.forEach.call(sugEl.children,function(el){
      el.addEventListener('mousedown',function(e){e.preventDefault();
        pick(sugItems[+el.getAttribute('data-i')]);});
    });
  }
  function pick(m){if(!m)return;searchEl.value=m.name;sugEl.className='';
    if(m._t==='company')openCompanyByName(m.name,true);
    else if(m._t==='faction')openFactionByName(m.name,true);
    else{flyToMarker(m);openPlace(m);}}
  function doSearch(q){
    q=fold(q);if(!q)return renderSug([]);
    var hits=[];
    MARKERS.forEach(function(m){if(fold(m.name).indexOf(q)>=0)hits.push(m);});
    PARTY.forEach(function(p){if(fold(p.name).indexOf(q)>=0)
      hits.push({name:p.name,type:'Company',_t:'company'});});
    FACTIONS.forEach(function(f){if(fold(f.name).indexOf(q)>=0)
      hits.push({name:f.name,type:'Faction',_t:'faction'});});
    hits.sort(function(a,b){return fold(a.name).indexOf(q)-fold(b.name).indexOf(q);});
    renderSug(hits.slice(0,10));
  }
  searchEl.addEventListener('input',function(){doSearch(this.value);});
  searchEl.addEventListener('keydown',function(e){
    if(e.key==='ArrowDown'||e.key==='ArrowUp'){e.preventDefault();
      if(!sugItems.length)return;
      sugIdx+=(e.key==='ArrowDown'?1:-1);
      sugIdx=(sugIdx+sugItems.length)%sugItems.length;
      Array.prototype.forEach.call(sugEl.children,function(el,i){
        el.className='sug'+(i===sugIdx?' active':'');});
    }else if(e.key==='Enter'){
      pick(sugIdx>=0?sugItems[sugIdx]:sugItems[0]);
    }else if(e.key==='Escape'){sugEl.className='';}
  });
  document.addEventListener('click',function(e){
    if(!e.target.closest('.search-wrap'))sugEl.className='';});
  document.addEventListener('keydown',function(e){
    if(e.key==='Escape'&&panel.classList.contains('open')&&sugEl.className!=='on')
      closePanel();
  });

  // ---- zoom-tier reveal ----
  function tierFor(z){
    var bz=tierZoom('b'), cz=tierZoom('c');
    return z>=cz-0.01?'c':z>=bz-0.01?'b':'a';
  }
  function updTier(){
    var t=tierFor(map.getZoom()), c=map.getContainer();
    c.classList.toggle('map-tier-a',t==='a');
    c.classList.toggle('map-tier-b',t==='b');
    c.classList.toggle('map-tier-c',t==='c');
    c.classList.toggle('atlas-labels',t==='c'); // labels on at closest tier
  }
  map.on('zoomend',updTier);
  map.on('zoom zoomend moveend',updScale);

  // ---- deep link (#place=Name) ----
  function hashVal(re){var m=String(location.hash||'').match(re);if(!m)return null;
    try{return decodeURIComponent(m[1]);}catch(_){return m[1];}}
  function handleHash(){
    var c=hashVal(/company=([^&]+)/); if(c){openCompanyByName(c,true);return;}
    var f=hashVal(/faction=([^&]+)/); if(f){openFactionByName(f,true);return;}
    var name=hashVal(/place=([^&]+)/); if(!name)return;
    var mk=MREF[fold(name)];
    if(mk){flyToMarker(mk);openPlace(mk);}
  }

  // ---- load everything ----
  function getJSON(u){return fetch(u).then(function(r){
    if(!r.ok)throw new Error(u+' '+r.status);return r.json();}).catch(function(){return null;});}

  Promise.all([
    getJSON('data/maps_markers.json'),
    getJSON('data/wiki-places.json'),
    getJSON('data/reviews.json'),
    getJSON('data/party-route.json'),
    getJSON('data/realms.geojson'),
    getJSON('data/party.json'),
    getJSON('data/factions.json')
  ]).then(function(res){
    var markers=res[0]||[], wiki=res[1]||[], reviews=res[2]||[],
        route=res[3]||[], realms=res[4];
    PARTY=res[5]||[]; FACTIONS=res[6]||[];

    wiki.forEach(function(p){WIKI[p.title]=p;WIKIFOLD[fold(p.title)]=p;});
    reviews.forEach(function(r){(REVIEWS[r.place]=REVIEWS[r.place]||[]).push(r);});
    PARTY.forEach(function(p){PMREF[fold(p.name)]=p;});
    FACTIONS.forEach(function(f){FMREF[fold(f.name)]=f;});

    buildMarkers(markers);

    var overlays={};
    var order=['Settlements','Major Regions','Minor Regions','Bodies of Water','Mountains and Hills'];
    var TL={'Settlements':'⌂ Settlements','Major Regions':'✦ Major Regions',
      'Minor Regions':'◆ Minor Regions','Bodies of Water':'≈ Bodies of Water',
      'Mountains and Hills':'▲ Mountains & Hills'};
    order.forEach(function(t){if(LAYERS[t]){LAYERS[t].addTo(map);overlays[TL[t]]=LAYERS[t];}});

    var realmLayer=buildRealms(realms);
    if(realmLayer){realmLayer.addTo(map);overlays['⚑ Realm Boundaries']=realmLayer;}

    var routeLayer=buildRoute(route);
    if(routeLayer){routeLayer.addTo(map);overlays['⚔ Party Route']=routeLayer;}

    // ---- Company + Factions layers (each experiment toggleable; default ON) ----
    var companyOrigins=buildOrigins();   // A
    companyTrails=buildTrails();          // C (module-scoped for strip emphasis)
    var companyMaster=L.layerGroup();     // D-master handle (toggles A+C+strip together)
    var factionBadges=buildFactionBadges();
    companyOrigins.addTo(map); companyTrails.addTo(map); companyMaster.addTo(map);
    factionBadges.addTo(map);
    overlays['⚑ The Company']=companyMaster;
    overlays[' ⚑ Origin homelands']=companyOrigins;
    overlays[' ⋯ Origin trails']=companyTrails;
    overlays['⛊ Faction seats']=factionBadges;

    addEraControl();
    layersCtrl=L.control.layers(null,overlays,{collapsed:window.innerWidth<=760,position:'topright'});
    layersCtrl.addTo(map);
    addJourneyControl();
    addScaleControl();
    addCompanyDock();                     // after scale → strip sits above the scale bar

    // master toggle drives the sub-layers + strip. Coordination is DEFERRED to a
    // timeout so it runs AFTER Control.Layers' _onInputClick finishes its own add/
    // remove loop (which would otherwise re-add the sub-layers from their still-checked
    // boxes, and where a synchronous _update() would corrupt the in-flight input list).
    function coordMaster(on){
      if(on){
        if(!map.hasLayer(companyOrigins))companyOrigins.addTo(map);
        if(!map.hasLayer(companyTrails))companyTrails.addTo(map);
      }else{
        if(map.hasLayer(companyOrigins))map.removeLayer(companyOrigins);
        if(map.hasLayer(companyTrails))map.removeLayer(companyTrails);
      }
      showStrip(on);
      if(layersCtrl&&layersCtrl._update)layersCtrl._update();  // reconcile checkboxes
    }
    var _mSync;
    map.on('overlayadd',function(e){if(e.layer===companyMaster){
      clearTimeout(_mSync);_mSync=setTimeout(function(){coordMaster(true);},0);}});
    map.on('overlayremove',function(e){if(e.layer===companyMaster){
      clearTimeout(_mSync);_mSync=setTimeout(function(){coordMaster(false);},0);}});

    updTier(); updScale(); handleHash();
    window.addEventListener('hashchange',handleHash);

    window.ATLAS={map:map,markers:MARKERS,party:PARTY,factions:FACTIONS,ready:true,
      find:function(n){return MREF[fold(n)];},
      fly:function(n){var m=MREF[fold(n)];if(m){flyToMarker(m);openPlace(m);}return !!m;},
      company:function(n){return openCompanyByName(n,true);},
      faction:function(n){return openFactionByName(n,true);},
      groups:openFactionsList,
      era:setEra, journey:startJourney, stopJourney:stopJourney,
      openRealm:openRealm, close:closePanel};
  });
})();
</script>
