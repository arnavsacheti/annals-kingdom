  // ================= Detail charts (spec CC): chart mode over the map stage ==========
  // vertical-fill min zoom for arbitrary chart dims, measured at the chart's unproject
  // reference zoom (tiles: maxz; single images: 0 → 1 native px = 1 CRS unit).
  function fillZoomAt(h,atZoom){
    var vh=map.getSize().y||map.getContainer().clientHeight||h;
    var z=atZoom+Math.log(vh/h)/Math.LN2;
    var snap=0.05;                          // fine quantum: near-exact fill, zoom itself is continuous
    return Math.ceil(z/snap)*snap;
  }
  function hvOf(h,re){var m=String(h||'').match(re);if(!m)return null;
    try{return decodeURIComponent(m[1]);}catch(_){return m[1];}}
  function buildPOILayer(canon,pois,cpx){
    var g=L.layerGroup();
    pois.forEach(function(p){
      var icon=L.divIcon({className:'',iconSize:[22,22],iconAnchor:[11,11],
        html:'<div class="poi-mk">'+p.n+'</div>'});
      var mk=L.marker(cpx(p.x,p.y),{icon:icon,title:p.name,riseOnHover:true});
      mk.bindTooltip(esc(p.name),{direction:'top',offset:[0,-11],className:'mk-tip',opacity:1});
      mk.on('click',function(){openPOI(canon,p);});
      p._pmk=mk; g.addLayer(mk);
    });
    return g;
  }
  function openPOI(canon,p){
    var h='<span class="card-type">'+esc(canon)+' · Point '+p.n+'</span>'+
      '<h2 class="card-name">'+esc(p.name)+'</h2>'+
      '<div class="card-lore"><p>'+esc(p.d||'')+'</p></div>'+
      (p.wikiSlug?'<a class="co-link" target="_blank" rel="noopener" href="https://princexizor.ddns.net/'+
        p.wikiSlug.split('/').map(encodeURIComponent).join('/')+'">Read on the wiki ↗</a><br/>':'')+
      '<a class="co-link" data-backcity="1">Part of '+esc(canon)+
        ' — back to the city card ↗</a>';
    showPanel(h);
    setHash('#chart='+encodeURIComponent(canon)+'&poi='+p.n);
    var b=panelBody.querySelector('[data-backcity]');
    if(b)b.addEventListener('click',function(){
      exitChart();
      var m=MREF[fold(canon)];
      if(m){flyToMarker(m);openPlace(m);}else openPlace({name:canon});
    });
  }
  function selectPOI(canon,n){
    var pois=POIS[canon]; if(!pois)return;
    for(var i=0;i<pois.length;i++)if(pois[i].n===n){
      openPOI(canon,pois[i]);
      if(pois[i]._pmk)map.panTo(pois[i]._pmk.getLatLng(),{animate:false});
      return;
    }
  }
  function chartTeardownLayers(){
    if(CHART.layer){map.removeLayer(CHART.layer);CHART.layer=null;}
    if(CHART.poiLayer){map.removeLayer(CHART.poiLayer);CHART.poiLayer=null;}
    if(CHART.titleCtrl){map.removeControl(CHART.titleCtrl);CHART.titleCtrl=null;}
    if(CHART.backCtrl){map.removeControl(CHART.backCtrl);CHART.backCtrl=null;}
    CHART.pois=null;
  }
  function enterChart(name,poiN){
    var canon=detailKey(name); if(!canon)return false;
    var def=DETAIL[canon];
    if(CHART.on){
      if(CHART.name===canon){if(poiN)selectPOI(canon,poiN);return true;}
      chartTeardownLayers();                 // switching charts: keep the saved world state
    }else{
      CHART.save={hash:location.hash,center:map.getCenter(),zoom:map.getZoom(),
        minZoom:map.getMinZoom(),maxZoom:map.getMaxZoom(),maxBounds:map.options.maxBounds};
      map.removeLayer(curBase);
      ensureCityOverlay(null);               // meshed-world overlay/POIs GC'd for the modal
      closePanel();                          // drop the place card; the chart is the view
      var mc=map.getContainer();
      mc.classList.add('chart-mode');
      mc.classList.remove('map-tier-a','map-tier-b','map-tier-c','map-tier-d',
        'atlas-labels','show-uncharted');
    }
    CHART.on=true; CHART.name=canon; CHART.def=def;
    var atZoom=def.kind==='tiles'?def.maxz:0; CHART.atZoom=atZoom;
    var cpx=function(x,y){return map.unproject([x,y],atZoom);}; CHART.cpx=cpx;
    var cb=L.latLngBounds(cpx(0,0),cpx(def.w,def.h)); CHART.cb=cb;
    if(def.kind==='tiles'){
      CHART.layer=L.tileLayer(def.path+'/{z}/{x}/{y}.jpg',{
        minNativeZoom:0,maxNativeZoom:RETINA?def.maxz-1:def.maxz,maxZoom:def.maxz+1,
        tileSize:256,noWrap:true,bounds:cb,detectRetina:true,keepBuffer:4,attribution:ATTR});
    }else{
      CHART.layer=L.imageOverlay(def.path,cb,{attribution:ATTR});
    }
    CHART.layer.addTo(map);
    var minZ=fillZoomAt(def.h,atZoom);
    // detectRetina drops the tile layer's effective maxZoom by 1 on HiDPI (maxz+1→maxz),
    // so the map's max must match or the deepest zoom renders over blank parchment
    // (same rule the era bases use). Image charts overzoom their single bitmap freely.
    var maxZ=def.kind==='tiles'?(RETINA?def.maxz:def.maxz+1):Math.max(minZ+2,atZoom+2);
    if(minZ>maxZ)minZ=maxZ;
    map.setMaxBounds(null);
    map.setMinZoom(minZ); map.setMaxZoom(maxZ);
    map.setView(cb.getCenter(),minZ,{animate:false});
    map.setMaxBounds(cb);
    map.panInsideBounds(cb,{animate:false});
    var pois=POIS[canon];
    if(pois&&pois.length){CHART.pois=pois;
      CHART.poiLayer=buildPOILayer(canon,pois,cpx); CHART.poiLayer.addTo(map);}
    // controls: title cartouche (topright) + Back to the Wide World (topleft, under zoom)
    var TitleC=L.Control.extend({options:{position:'topright'},onAdd:function(){
      var d=L.DomUtil.create('div','chart-title');
      d.innerHTML='<div class="ct-name">'+esc(canon)+'</div><div class="ct-sub">'+esc((CHART.def&&CHART.def.label)||'Chart')+'</div>';
      L.DomEvent.disableClickPropagation(d);return d;}});
    var BackC=L.Control.extend({options:{position:'topleft'},onAdd:function(){
      var d=L.DomUtil.create('div','chart-back');
      var b=L.DomUtil.create('button','',d);
      b.type='button'; b.innerHTML='← Back to the Wide World';
      L.DomEvent.disableClickPropagation(d);
      b.addEventListener('click',exitChart);return d;}});
    CHART.titleCtrl=new TitleC(); CHART.backCtrl=new BackC();
    map.addControl(CHART.titleCtrl); map.addControl(CHART.backCtrl);
    setHash('#chart='+encodeURIComponent(canon));
    if(poiN)selectPOI(canon,poiN);
    return true;
  }
  function restorePanel(h){
    var n;
    if((n=hvOf(h,/place=([^&]+)/))){var m=MREF[fold(n)];if(m){openPlace(m);return true;}}
    if((n=hvOf(h,/company=([^&]+)/))&&openCompanyByName(n,false))return true;
    if((n=hvOf(h,/faction=([^&]+)/))&&openFactionByName(n,false))return true;
    return false;
  }
  function exitChart(){
    if(!CHART.on)return;
    var s=CHART.save;
    chartTeardownLayers();
    CHART.on=false; CHART.name=null; CHART.def=null; CHART.cb=null;
    map.getContainer().classList.remove('chart-mode');
    curBase.addTo(map);                        // era was never touched → restores as saved
    map.setMaxBounds(null);
    map.setMinZoom(s.minZoom); map.setMaxZoom(s.maxZoom);
    var sn=map.options.zoomSnap; map.options.zoomSnap=0;  // preserve an unsnapped fly zoom exactly
    map.setView(s.center,s.zoom,{animate:false});
    map.options.zoomSnap=sn;
    map.setMaxBounds(s.maxBounds);
    updTier(); updScale(); worldOpacityUpdate(); worldCityUpdate();  // re-establish meshed world
    if(!(s.hash&&/(?:place|company|faction)=/.test(s.hash)&&restorePanel(s.hash)))
      closePanel();
    CHART.save=null;
  }

  // ================= The meshed world (spec MW §A/§C): continuous zoom ================
  // City footprints live in WORLD (atlas) coordinates. A city's chart — a real overlay
  // or a canvas the generator (spec §B) hands to registerCityOverlay — spans its
  // footprint square (aspect-preserved) and fades in as the atlas fades out. Provenance
  // rides every card. REFINEMENT SURFACE: to upgrade a placeholder city, hand-edit
  // data/city-traits.json (traits) or add a real chart + call registerCityOverlay — no
  // code changes needed here.
  var CITY_ANCHORS={}, CITY_ANCHORS_FOLD={}, CITY_TRAITS={}, CITYREG={};
  var CITYVIEW={name:null,overlay:null,poiLayer:null,poiOn:false,wash:null,stubs:null};
  var overlayCache=new Map();               // name -> L.imageOverlay (LRU, cap 6)

  function log2(x){return Math.log(x)/Math.LN2;}
  function footR(kind){return FOOT_R[kind]!=null?FOOT_R[kind]:9;}
  function cityAnchorKey(name){
    if(name==null)return null;
    if(CITY_ANCHORS[name])return name;
    return CITY_ANCHORS_FOLD[fold(name)]||null;
  }
  function registryFor(name){var k=cityAnchorKey(name);return (k&&CITYREG[k])||null;}
  // any anchored city is a meshed-world citizen: explicit traits, a registered overlay,
  // or (census towns) a default plan generated from the anchor's own kind/harbor/sea → descend.
  function isFlyInCity(name){return !!cityAnchorKey(name);}
  // default traits for anchors lacking a data/city-traits entry ('defaults apply'): the
  // anchor already carries the only fields genCityCanvas needs (kind/harbor/sea).
  function traitsFor(key){var a=CITY_ANCHORS[key];
    return CITY_TRAITS[key]||(a?{kind:a.kind,harbor:a.harbor,sea:a.sea}:null);}

  // footprint square in world px; the image (w×h) is aspect-fit into a 2r side box.
  function cityBox(a,w,h){var r=footR(a.kind),mx=Math.max(w,h);
    var hw=r*w/mx, hh=r*h/mx;
    return {hw:hw,hh:hh,x0:a.atlasX-hw,y0:a.atlasY-hh,x1:a.atlasX+hw,y1:a.atlasY+hh,
            fw:2*hw,fh:2*hh};}
  // native resolution sets the city's own deepest zoom (1 image px ≈ 1 screen px).
  function cityMaxZ(a,w,h){var r=footR(a.kind),mx=Math.max(w,h);
    return Math.min(Z_STREET,NZ+log2(mx/(2*r)));}

  function baseOpacity(z){if(z<=6.2)return 1;if(z>=8)return 0.12;
    return 1-(z-6.2)/1.8*0.88;}              // 1.0 → 0.12 across z6.2→8
  function overlayOpacity(z){if(z<=6.8)return 0;if(z>=7.8)return 1;return z-6.8;}

  function nearestCity(cx,cy){
    var best=null,bd=Infinity,ba=null;
    for(var k in CITY_ANCHORS){var a=CITY_ANCHORS[k];
      var dx=a.atlasX-cx,dy=a.atlasY-cy,d=Math.sqrt(dx*dx+dy*dy);
      if(d<bd){bd=d;best=k;ba=a;}}
    if(best&&bd<=3*footR(ba.kind))return {name:best,dist:bd,a:ba};   // ~3 footprint radii
    return null;
  }

  // ---- provenance rendering (spec §C) ----
  function provBlock(prov,annals){
    if(prov==='canon')return '<div class="prov-arch">⚜ From the campaign archives</div>';
    if(prov==='trace')return '<div class="prov-banner trace">⌖ traced from the atlas — course approximate.</div>';
    if(annals)return '<div class="prov-banner annals">✶ per the Annals’ telling.</div>';
    return '<div class="prov-banner">✶ Conjectural — a placeholder until the chronicles say more.</div>';
  }
  // only pure invention wears the ✶; 'trace' (surveyed-but-approximate) does not.
  function provStar(prov){return prov==='invented'?'<sup class="prov-star">✶</sup>':'';}

  // ---- overlay cache (LRU) ----
  function lruPut(k,v){
    if(overlayCache.has(k))overlayCache.delete(k);
    overlayCache.set(k,v);
    while(overlayCache.size>6){var oldest=overlayCache.keys().next().value;
      var ov=overlayCache.get(oldest);overlayCache.delete(oldest);
      if(ov&&map.hasLayer(ov))map.removeLayer(ov);}
  }

  // ---- world POIs (image-space → world coords through the footprint transform) ----
  function poiByN(name,n){var reg=registryFor(name);if(!reg||!reg.pois)return null;
    for(var i=0;i<reg.pois.length;i++)if(reg.pois[i].n===n)return reg.pois[i];return null;}
  function worldPOICoord(name,n){
    var reg=registryFor(name),a=CITY_ANCHORS[cityAnchorKey(name)],p=poiByN(name,n);
    if(!reg||!a||!p)return null;
    var box=cityBox(a,reg.w,reg.h),pr=reg.poiRef||{w:reg.w,h:reg.h};
    return px(box.x0+(p.x/pr.w)*box.fw, box.y0+(p.y/pr.h)*box.fh);
  }
  function buildWorldPOIs(name,reg,a){
    if(!reg.pois||!reg.pois.length)return null;
    var box=cityBox(a,reg.w,reg.h),pr=reg.poiRef||{w:reg.w,h:reg.h},g=L.layerGroup();
    reg.pois.forEach(function(p){
      var ll=px(box.x0+(p.x/pr.w)*box.fw, box.y0+(p.y/pr.h)*box.fh);
      var icon=L.divIcon({className:'',iconSize:[22,22],iconAnchor:[11,11],
        html:'<div class="poi-mk">'+p.n+'</div>'});
      var mk=L.marker(ll,{icon:icon,title:p.name,pane:'pCityPOI',riseOnHover:true});
      mk.bindTooltip(esc(p.name)+provStar(p.prov),
        {direction:'top',offset:[0,-11],className:'mk-tip',opacity:1});
      mk.on('click',function(){openWorldPOI(name,p);});
      p._wmk=mk; g.addLayer(mk);
    });
    return g;
  }
  function openWorldPOI(name,p){
    var prov=p.prov||'canon';
    var h='<span class="card-type">'+esc(name)+' · Point '+p.n+'</span>'+
      '<h2 class="card-name">'+esc(p.name)+provStar(prov)+'</h2>'+
      provBlock(prov)+
      '<div class="card-lore"><p>'+esc(p.d||'')+'</p></div>'+
      (p.wikiSlug?'<a class="co-link" target="_blank" rel="noopener" href="https://princexizor.ddns.net/'+
        p.wikiSlug.split('/').map(encodeURIComponent).join('/')+'">Read on the wiki ↗</a><br/>':'')+
      '<a class="co-link" data-backcity="1">Part of '+esc(name)+' — back to the city ↗</a>';
    showPanel(h);
    setHash('#chart='+encodeURIComponent(name)+'&poi='+p.n);
    var b=panelBody.querySelector('[data-backcity]');
    if(b)b.addEventListener('click',function(){var m=MREF[fold(name)];
      if(m)openPlace(m);else openPlace({name:name});});
  }

  // ---- under-plan parchment wash (terrain continuity §b) ----
  // A soft radial patch toned to the sampled atlas land hue, ~1.7× the footprint,
  // in a pane just UNDER pCity, riding the same overlayOpacity ramp — so the
  // magnified printed town label/dot wash out under any active plan (real charts
  // included) instead of fighting it.
  var WASHC={};                              // key -> wash canvas dataURL
  function washUrl(key){
    if(WASHC[key])return WASHC[key];
    var q=MASKQ[key],tn=(q&&q.s&&q.m&&q.m.land)||LAND_TAN;
    var wc=document.createElement('canvas');wc.width=wc.height=256;
    var wg=wc.getContext('2d');
    var col=tn[0]+','+tn[1]+','+tn[2];
    var rg=wg.createRadialGradient(128,128,0,128,128,128);
    rg.addColorStop(0,'rgba('+col+',.94)');rg.addColorStop(.5,'rgba('+col+',.94)');
    rg.addColorStop(.78,'rgba('+col+',.5)');rg.addColorStop(1,'rgba('+col+',0)');
    wg.fillStyle=rg;wg.fillRect(0,0,256,256);
    return WASHC[key]=wc.toDataURL();
  }
  function washMake(key,reg,a){
    var box=cityBox(a,reg.w,reg.h),f=1.7;
    var wb=L.latLngBounds(px(a.atlasX-box.hw*f,a.atlasY-box.hh*f),
                          px(a.atlasX+box.hw*f,a.atlasY+box.hh*f));
    var wo=L.imageOverlay(washUrl(key),wb,{pane:'pCityWash',opacity:0,interactive:false});
    wo.addTo(map);
    wo.setOpacity(overlayOpacity(map.getZoom()));
    return wo;
  }
  function washRefresh(key){                 // sampled tone landed while on screen
    if(CITYVIEW.name!==key||!CITYVIEW.wash)return;
    map.removeLayer(CITYVIEW.wash);
    CITYVIEW.wash=washMake(key,CITYREG[key],CITY_ANCHORS[key]);
  }

  // street-tier road stubs for a generated plan (route continuity §): subtle way-styled
  // lines in the pCity pane (NOT faded by tier-d) so the world road reads as arriving even
  // at street tier. Real charts (canon) carry no stubs. Casing + ink like buildNamedWays.
  function buildCityStubs(reg){
    if(!reg||reg.prov!=='invented'||!reg.stubs||!reg.stubs.length)return null;
    var g=L.layerGroup();
    reg.stubs.forEach(function(s){
      var ll=[px(s.x0,s.y0),px(s.x1,s.y1)];
      L.polyline(ll,{color:'#efe6cf',weight:6,opacity:.5,lineCap:'round',pane:'pCity',interactive:false}).addTo(g);
      L.polyline(ll,{color:'#6a4326',weight:2.6,opacity:.6,lineCap:'round',pane:'pCity',interactive:false}).addTo(g);
    });
    return g;
  }

  // ---- instantiate / GC the single active city overlay + its POIs ----
  function ensureCityOverlay(name){
    var key=name?cityAnchorKey(name):null;
    if(CITYVIEW.name===key)return;
    if(CITYVIEW.overlay&&map.hasLayer(CITYVIEW.overlay))map.removeLayer(CITYVIEW.overlay);
    if(CITYVIEW.poiLayer&&map.hasLayer(CITYVIEW.poiLayer))map.removeLayer(CITYVIEW.poiLayer);
    if(CITYVIEW.wash&&map.hasLayer(CITYVIEW.wash))map.removeLayer(CITYVIEW.wash);
    if(CITYVIEW.stubs&&map.hasLayer(CITYVIEW.stubs))map.removeLayer(CITYVIEW.stubs);
    CITYVIEW.name=null;CITYVIEW.overlay=null;CITYVIEW.poiLayer=null;CITYVIEW.poiOn=false;
    CITYVIEW.wash=null;CITYVIEW.stubs=null;
    if(!key)return;
    var reg=CITYREG[key],a=CITY_ANCHORS[key]; if(!reg||!a)return;
    CITYVIEW.name=key;
    var ov=overlayCache.get(key);
    if(!ov){
      var box=cityBox(a,reg.w,reg.h);
      var cb=L.latLngBounds(px(box.x0,box.y0),px(box.x1,box.y1));
      ov=L.imageOverlay(reg.url,cb,{pane:'pCity',opacity:0,interactive:false,attribution:ATTR});
      lruPut(key,ov);
    }
    ov.setOpacity(overlayOpacity(map.getZoom()));
    ov.addTo(map); CITYVIEW.overlay=ov;
    CITYVIEW.wash=washMake(key,reg,a);
    var st=buildCityStubs(reg); if(st){CITYVIEW.stubs=st;st.addTo(map);}
    var wp=buildWorldPOIs(key,reg,a);
    if(wp){CITYVIEW.poiLayer=wp;
      if(map.getZoom()>=8){wp.addTo(map);CITYVIEW.poiOn=true;}}
  }
  function setCityPOIVisible(on){
    if(!CITYVIEW.poiLayer)return;
    if(on&&!CITYVIEW.poiOn){CITYVIEW.poiLayer.addTo(map);CITYVIEW.poiOn=true;}
    else if(!on&&CITYVIEW.poiOn){map.removeLayer(CITYVIEW.poiLayer);CITYVIEW.poiOn=false;}
  }

  // ---- the two per-frame passes ----
  // (a) opacity/tier-d/watermark — rides the live 'zoom' event for a smooth crossfade.
  function worldOpacityUpdate(){
    if(CHART.on)return;
    var z=map.getZoom(), mc=map.getContainer();
    if(curBase&&curBase.setOpacity)curBase.setOpacity(baseOpacity(z));
    if(CITYVIEW.overlay)CITYVIEW.overlay.setOpacity(overlayOpacity(z));
    if(CITYVIEW.wash)CITYVIEW.wash.setOpacity(overlayOpacity(z));
    mc.classList.toggle('map-tier-d',z>=Z_TIER_D);
    mc.classList.toggle('show-uncharted',z>6.8&&!CITYVIEW.name);
  }
  // (b) nearest-city / instantiate / GC / dynamic maxZoom — zoomend+moveend ONLY.
  var PREWARMED=new Set();
  function worldCityUpdate(){
    if(CHART.on)return;
    var z=map.getZoom();
    var cp=map.project(map.getCenter(),NZ);
    var near=nearestCity(cp.x,cp.y);
    if(near&&z>6.5)ensureCityGen(near.name);        // generate the nearest plan as we descend
    else if(near&&z>5.6&&!CITYREG[near.name]&&!PREWARMED.has(near.name)){
      // approaching: pre-bake the plan during idle so the crossfade never jank-draws
      var fr=(FOOT_R[near.a.kind]||9)*6, dx=cp.x-near.a.atlasX, dy=cp.y-near.a.atlasY;
      if(dx*dx+dy*dy<fr*fr){
        PREWARMED.add(near.name);
        (window.requestIdleCallback||function(f){setTimeout(f,180);})(function(){ensureCityGen(near.name);});
      }
    }
    var reg=near&&registryFor(near.name);
    var allowed=reg?cityMaxZ(near.a,reg.w,reg.h):Z_OPEN_MAX;
    allowed=Math.min(Z_STREET,allowed);
    if(Math.abs(map.getMaxZoom()-allowed)>0.001)map.setMaxZoom(allowed); // Leaflet eases down
    ensureCityOverlay((reg&&z>6.5)?near.name:null);
    setCityPOIVisible(z>=8);
  }

  // ---- fly INTO a city (zoom-through; replaces modal chart for anchored cities) ----
  function flyIntoCity(name,poiN){
    var key=cityAnchorKey(name); if(!key)return false;
    ensureCityGen(key);                            // kick the melded plan (async: tiles)
    ensureCityGenNow(key);                         // deep links never wait: synthetic now
    var reg=CITYREG[key],a=CITY_ANCHORS[key]; if(!reg||!a)return false;
    if(CHART.on)exitChart();
    var cz=cityMaxZ(a,reg.w,reg.h);
    if(map.getMaxZoom()<cz)map.setMaxZoom(cz);   // permit the deep zoom before flying
    ensureCityOverlay(key);                        // eager: fades in DURING the descent
    var target=Math.max(map.getZoom(),cz-0.5);
    var dest=px(a.atlasX,a.atlasY);
    if(poiN){var wc=worldPOICoord(key,poiN); if(wc)dest=wc;}
    else closePanel();
    setHash('#chart='+encodeURIComponent(key)+(poiN?'&poi='+poiN:''));
    if(poiN)map.once('moveend',function(){var p=poiByN(key,poiN);if(p)openWorldPOI(key,p);});
    // Kick the fly one paint frame late so a just-generated 2048² plan's synchronous
    // draw/JPEG-encode doesn't share the animation's opening tick — a cheap smoothness
    // hedge. The GUARANTEE that a shared #chart=City link never strands the reader at
    // the world view is ensureArrival() below, armed UNCONDITIONALLY (never nested in
    // the rAF): flyTo is rAF-driven, so on a backgrounded/throttled tab the fly can
    // never step — a net inside rAF would never arm either. setView(animate:false)
    // needs no rAF, so an independent timer is what actually lands the view.
    requestAnimationFrame(function(){map.flyTo(dest,target,{duration:1.4,easeLinearity:.25});});
    ensureArrival(dest,target,0);
    return true;
  }

  // Safety net for the deep-zoom fly (see flyIntoCity): if the rAF-timed animation
  // stalls or leaves the map in a stranded zoom-animation state, hard-land the view so
  // a #chart=City deep link is never a coin-flip between arriving and marooning the
  // reader at the world view with no error.
  function ensureArrival(dest,target,tries){
    setTimeout(function(){
      if(CHART.on)return;                         // reader left for modal chart mode
      if(map.getZoom()>=target-0.5){worldCityUpdate();return;} // arrived (allow easing slack)
      map._animatingZoom=false;                   // clear a stranded zoom-anim flag, else _tryAnimatedZoom makes setView silently no-op
      if(map._mapPane)map._mapPane.classList.remove('leaflet-zoom-anim'); // drop a lingering transition class before the hard transform
      map.setView(dest,target,{animate:false});   // synchronous reset (no rAF) → fires moveend → the pending POI handler still catches it
      worldCityUpdate();
      if(map.getZoom()<target-0.5&&tries<2)ensureArrival(dest,target,tries+1);
    },1700);
  }

  // ---- generator hook (spec §B calls this): register a real overlay or a canvas ----
  // img: URL string | HTMLCanvasElement | HTMLImageElement. opts: {prov,provText,w,h,
  // poiRef,pois}. Canvas/image dims are read if w/h omitted.
  function registerCityOverlay(name,img,opts){
    opts=opts||{};
    var url,w=opts.w,h=opts.h;
    if(typeof img==='string')url=img;
    else if(img&&img.toDataURL){url=img.toDataURL('image/webp',0.85);
      // Safari can't encode webp; png also keeps the vignette's alpha
      if(url.indexOf('data:image/webp')!==0)url=img.toDataURL('image/png');
      w=w||img.width;h=h||img.height;}
    else if(img&&img.src){url=img.src;w=w||img.naturalWidth||img.width;
      h=h||img.naturalHeight||img.height;}
    else return false;
    var key=cityAnchorKey(name)||name;
    CITYREG[key]={url:url,w:w,h:h,prov:opts.prov||'invented',provText:opts.provText||null,
      poiRef:opts.poiRef||null,pois:opts.pois||null,stubs:opts.stubs||null};
    overlayCache.delete(key);
    if(CITYVIEW.name===key){CITYVIEW.name=null;ensureCityOverlay(key);} // hot-swap if viewing
    return true;
  }

  // ================= The city generator (spec MW §B): plausible plans everywhere ========
  // Every anchored city WITHOUT a real chart gets a seeded, deterministic plan (mulberry32
  // of the city name — the same city every visit) rendered to a canvas, then handed to
  // registerCityOverlay via the SAME footprint/overlay path as the real charts. Everything
  // it invents (streets, POIs, inn names) is provenance 'invented' → the ✶ banner + the
  // baked "drawn from hearsay" watermark. REFINEMENT SURFACE: hand-editing a city's traits
  // in data/city-traits.json (harbor/sea → shore, kind → wall/extent, patron → temple) or
  // adding a real chart to detail-charts.json + an overlay upgrades a city with NO code
  // change here — this generator is only the placeholder until the archives say more.
  var GEN_SIZE=2048;
  var COMPASS={N:0,NNE:22.5,NE:45,ENE:67.5,E:90,ESE:112.5,SE:135,SSE:157.5,
    S:180,SSW:202.5,SW:225,WSW:247.5,W:270,WNW:292.5,NW:315,NNW:337.5};
  // seeded RNG: xmur3 string-hash seeds a mulberry32 stream (pure fn of the name).
  function xmur3(s){var h=1779033703^s.length;
    for(var i=0;i<s.length;i++){h=Math.imul(h^s.charCodeAt(i),3432918353);h=h<<13|h>>>19;}
    return function(){h=Math.imul(h^h>>>16,2246822507);h=Math.imul(h^h>>>13,3266489909);
      return (h^=h>>>16)>>>0;};}
  function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;
    var t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;
    return ((t^t>>>14)>>>0)/4294967296;};}
  // in-voice inn names (echo the canon "Black Barghest").
  var INN_ADJ=['Copper','Salt','Black','Grey','Old','Broken','Gilded','Iron','Red','Green',
    'Silver','Amber','Weeping','Crooked','Drowned','Brazen','White','Ashen'];
  var INN_NOUN=['Krake','Elk','Barghest','Anchor','Oar','Lantern','Gull','Hart','Drake',
    'Kettle','Crown','Antler','Heron','Coin','Whale','Spar','Cormorant','Sturgeon','Bell'];

  function compassVec(side){var d=COMPASS[side];if(d==null)return null;
    var r=d*Math.PI/180;return {x:Math.sin(r),y:-Math.cos(r)};}   // screen y-down: N=up
  function dirName(vx,vy){var a=(Math.atan2(vx,-vy)*180/Math.PI+360)%360;
    var names=['N','NE','E','SE','S','SW','W','NW'];return names[Math.round(a/45)%8];}

  // ---- per-city approach bearings (route continuity §) ----
  // Every world polyline that ENDS within, or PASSES THROUGH, a 2.5×footprint radius of a
  // city's anchor yields an approach bearing = the angle anchor→boundary-crossing. Party
  // route legs (incl. vias) + named ways classify 'land' (→ gates/roads); sea lanes 'sea'
  // (→ quay bias). Pure fn of static geometry, cached on the anchor, so a city's plan is
  // identical across reloads.
  var APPR_POLYS=null;             // [{pts:[[x,y]..],cls:'land'|'sea'}] built once at load
  function buildApprPolys(route,ways,lanes){
    var P=[];
    if(route)for(var i=1;i<route.length;i++){        // party legs: [prev, ...via, cur]
      var leg=[[route[i-1].x,route[i-1].y]];
      (route[i].via||[]).forEach(function(v){leg.push([v[0],v[1]]);});
      leg.push([route[i].x,route[i].y]);
      P.push({pts:leg,cls:'land'});}
    if(ways)ways.forEach(function(w){if(w.pts&&w.pts.length>=2)P.push({pts:w.pts,cls:'land'});});
    if(lanes)lanes.forEach(function(l){if(l.pts&&l.pts.length>=2)P.push({pts:l.pts,cls:'sea'});});
    APPR_POLYS=P;
  }
  function segCircleHits(ax,ay,bx,by,cx,cy,Rr,out){  // push bearings of segment∩circle, t∈[0,1]
    var dx=bx-ax,dy=by-ay,A=dx*dx+dy*dy; if(A<1e-9)return;
    var fx=ax-cx,fy=ay-cy,B=2*(fx*dx+fy*dy),C=fx*fx+fy*fy-Rr*Rr,disc=B*B-4*A*C;
    if(disc<0)return; disc=Math.sqrt(disc);
    var t1=(-B-disc)/(2*A),t2=(-B+disc)/(2*A);
    if(t1>=0&&t1<=1)out.push(Math.atan2(ay+dy*t1-cy,ax+dx*t1-cx));
    if(t2>=0&&t2<=1&&Math.abs(t2-t1)>1e-6)out.push(Math.atan2(ay+dy*t2-cy,ax+dx*t2-cx));
  }
  function angDelta(a,b){var d=a-b;while(d>Math.PI)d-=2*Math.PI;while(d<-Math.PI)d+=2*Math.PI;return Math.abs(d);}
  function mergeAngles(arr){        // cluster crossings within ~14° via unit-vector mean
    var out=[];
    for(var i=0;i<arr.length;i++){var m=false;
      for(var k=0;k<out.length;k++)if(angDelta(arr[i],out[k].a)<0.25){
        out[k].sx+=Math.cos(arr[i]);out[k].sy+=Math.sin(arr[i]);
        out[k].a=Math.atan2(out[k].sy,out[k].sx);m=true;break;}
      if(!m)out.push({a:arr[i],sx:Math.cos(arr[i]),sy:Math.sin(arr[i])});}
    return out.map(function(o){return o.a;});
  }
  function cityApproaches(key){
    var a=CITY_ANCHORS[key]; if(!a)return {land:[],sea:[]};
    if(a._appr)return a._appr;
    if(!APPR_POLYS)return {land:[],sea:[]};          // not loaded yet: DON'T cache (would poison)
    var Rr=2.5*footR(a.kind),landB=[],seaB=[];
    for(var p=0;p<APPR_POLYS.length;p++){var pl=APPR_POLYS[p],dst=(pl.cls==='sea')?seaB:landB;
      for(var s=0;s<pl.pts.length-1;s++)
        segCircleHits(pl.pts[s][0],pl.pts[s][1],pl.pts[s+1][0],pl.pts[s+1][1],a.atlasX,a.atlasY,Rr,dst);}
    var res={land:mergeAngles(landB),sea:mergeAngles(seaB)};
    a._appr=res; return res;
  }

  function genCityCanvas(name,t,a,mask){
    var seed=xmur3(name)(),R=mulberry32(seed);
    function rr(lo,hi){return lo+(hi-lo)*R();}
    function ri(lo,hi){return Math.floor(lo+(hi-lo+1)*R());}
    function pick(ar){return ar[Math.floor(R()*ar.length)];}
    var S=GEN_SIZE, cv=document.createElement('canvas'); cv.width=S;cv.height=S;

          var fd=rr(30,90), fx0=waterNode.x+Math.cos(fa)*fd, fy0=waterNode.y+Math.sin(fa)*fd;
          if(!inWater(fx0,fy0))continue;
          var fdir=rr(0,Math.PI), fn=ri(4,8);
          g.fillStyle='#4a3520';
          for(var fk=0;fk<fn;fk++){
            var sx2=fx0+Math.cos(fdir)*fk*7, sy2=fy0+Math.sin(fdir)*fk*7;
            if(inWater(sx2,sy2))g.fillRect(sx2-1,sy2-1,2,2.6);
          }
        }
      }
      // Lakemen stilt-pier rows reaching out over the water (canon: Penthelon of the Five Fingers)
      if(lakemen){var nP=ri(4,7);
        for(var pi=0;pi<nP;pi++){var pb2=null,pvv=sv;
          if(WD){var pa3=(pi/nP)*2*Math.PI;                 // sweep full circle: a lake nub has shore on every side
            pb2=shoreHit(cx,cy,Math.cos(pa3),Math.sin(pa3));
            if(!pb2)continue; pvv=seaNormal(pb2.x,pb2.y);}
          else{var ps=(nP>1?(pi/(nP-1)-.5):0)*coreR*1.3;
            pb2={x:cx+sv.x*shoreOff(ps)+perp.x*ps,y:cy+sv.y*shoreOff(ps)+perp.y*ps};}
          var plen=rr(42,82),hw=rr(8,12);
          g.save();g.translate(pb2.x,pb2.y);g.rotate(Math.atan2(pvv.y,pvv.x));
          g.strokeStyle='#6a4a30';g.lineWidth=3;g.beginPath();g.moveTo(0,0);g.lineTo(plen,0);g.stroke();
          g.fillStyle='#4a3520';for(var st2=8;st2<plen;st2+=9)g.fillRect(st2-1,-1,2,2);   // stilts
          g.fillStyle=pick(BLD);g.strokeStyle=OUT;g.lineWidth=0.8;                          // pier hut over water
          g.fillRect(plen-3,-hw/2,hw,hw);g.strokeRect(plen-3,-hw/2,hw,hw);g.restore();}}
    }

    // --- bridges: a deck where the primary ways cross the river (max 2; nearest the
    // square first). Ruins get the bare stream — no bridges, no river quays. ---
    if(RV&&!ruin){
      var rvVis=function(x,y){x=x<1?1:x>S-2?S-2:x|0;y=y<1?1:y>S-2?S-2:y|0;
        return RVD[(y*S+x)*4+3]>=128;};
      var xings=[];
      var scanPoly=function(pts){for(var i9=0;i9<pts.length-1;i9++){
        var A9=pts[i9],B9=pts[i9+1],dx9=B9.x-A9.x,dy9=B9.y-A9.y,L9=Math.hypot(dx9,dy9);
        if(L9<2)continue;
        var ux9=dx9/L9,uy9=dy9/L9,in9=false,e9=null;
        for(var d9=0;d9<=L9;d9+=3){var px9=A9.x+ux9*d9,py9=A9.y+uy9*d9;
          if(rvVis(px9,py9)){if(!in9){in9=true;e9={x:px9,y:py9};}}
          else if(in9){in9=false;
            xings.push({x:(e9.x+px9)/2,y:(e9.y+py9)/2,ux:ux9,uy:uy9,
              len:Math.hypot(px9-e9.x,py9-e9.y)});}}}};
      roads.forEach(scanPoly);
      if(hinterGate)scanPoly([{x:sq.x,y:sq.y},{x:hinterGate.x,y:hinterGate.y},
        {x:cx+Math.cos(hinterGate.ang)*S*0.62,y:cy+Math.sin(hinterGate.ang)*S*0.62}]);
      if(!xings.length)lanes.forEach(function(l9){scanPoly(l9.pts);});
      xings=xings.filter(function(q9){return q9.len<rvW0*2.4;});   // skip near-parallel grazes
      xings.sort(function(a9,b9){return Math.hypot(a9.x-sq.x,a9.y-sq.y)-Math.hypot(b9.x-sq.x,b9.y-sq.y);});
      var decks=[];
      xings.forEach(function(q9){if(decks.length>=2)return;
        for(var i9=0;i9<decks.length;i9++)
          if(Math.hypot(decks[i9].x-q9.x,decks[i9].y-q9.y)<rvW0*2.5)return;
        decks.push(q9);});
      decks.forEach(function(q9){var hl9=q9.len/2+8,hw9=roadHalf*1.15;
        g.save();g.translate(q9.x,q9.y);g.rotate(Math.atan2(q9.uy,q9.ux));
        g.fillStyle=ROAD;g.fillRect(-hl9,-hw9,hl9*2,hw9*2);               // deck
        g.strokeStyle=OUT;g.lineWidth=2;
        g.beginPath();g.moveTo(-hl9,-hw9);g.lineTo(hl9,-hw9);
        g.moveTo(-hl9,hw9);g.lineTo(hl9,hw9);g.stroke();                  // side casings
        g.beginPath();g.moveTo(-hl9,-hw9);g.lineTo(-hl9-7,-hw9-6);
        g.moveTo(-hl9,hw9);g.lineTo(-hl9-7,hw9+6);
        g.moveTo(hl9,-hw9);g.lineTo(hl9+7,-hw9-6);
        g.moveTo(hl9,hw9);g.lineTo(hl9+7,hw9+6);g.stroke();               // splayed ends
        g.restore();});
    }

    // --- temple precinct (drawn over infill) ---
    if(temple){g.save();g.translate(temple.x,temple.y);
      g.fillStyle='#d8cba6';g.strokeStyle=STONE_O;g.lineWidth=1.6;
      g.fillRect(-temple.w/2,-temple.h/2,temple.w,temple.h);
      g.strokeRect(-temple.w/2,-temple.h/2,temple.w,temple.h);
      var cw=temple.w*.5,ch=temple.h*.55;g.fillStyle='#c9b98f';
      g.fillRect(-cw/2,-ch/2,cw,ch);g.strokeRect(-cw/2,-ch/2,cw,ch);
      g.fillStyle=STONE_O;   // colonnade dots
      for(var col=-temple.w/2+6;col<temple.w/2-4;col+=8){
        g.beginPath();g.arc(col,-temple.h/2+4,1.6,0,6.283);g.fill();
        g.beginPath();g.arc(col,temple.h/2-4,1.6,0,6.283);g.fill();}
      g.restore();}

    // --- market square paving (subtle) ---
    g.save();g.translate(sq.x,sq.y);g.fillStyle=ruin?'rgba(200,190,160,.4)':'#e9e0c4';
    g.strokeStyle=INK;g.lineWidth=1;g.fillRect(-sqSz/2,-sqSz/2,sqSz,sqSz);
    g.strokeRect(-sqSz/2,-sqSz/2,sqSz,sqSz);g.restore();

    // ===== POIs (all provenance 'invented'; rendered as world roundels by the engine) =====
    var pois=[], pn=0;
    function addPoi(x,y,nm,d){pn++;pois.push({n:pn,name:nm,x:x,y:y,d:d,prov:'invented'});}
    if(ruin){
      addPoi(sq.x,sq.y,hords?'The Ruined Steading':'The Fallen Forum',hords?'Where the great hall of the steading once stood; only hearth-stones and fallen posts remain.':'Where the seat of the old Māgos once stood; only pavings and toppled columns remain.');
      var bh0=gates.length?gates[0]:{x:cx+coreR*.4,y:cy};
      addPoi(cx+rr(-coreR*.2,coreR*.2),cy+rr(-coreR*.2,coreR*.2),hords?'The Great Long-Hall':'The Burned Hall',hords?'The roofless shell of a Hord long-hall, its ridge-beam long since fallen; the largest of the steading’s halls.':'A roofless shell, its stones blackened; said to be the tallest of those the empress put to the torch.');
      if(drawWater)addPoi(cx+sv.x*(shoreDist+S*0.14),cy+sv.y*(shoreDist+S*0.14),'The Island Fortress','A ruined keep on its island, half a mile offshore; the sea has taken the causeway.');
      addPoi(cx+Math.cos(gate0)*coreR*.85,cy+Math.sin(gate0)*coreR*.85,'The Broken Gate','A gap in the fallen wall where a gatehouse once barred the road.');
    } else {
      var mktN=cond==='faded'?'The Half-Empty Market':cond==='decayed'?'The Failing Market':'The Market Square';
      var mktD=cond==='faded'?'The town’s market; half its stalls stand idle now, the fair-days thinner than the old folk recall.'
        :cond==='decayed'?'A market much shrunk; a few stalls keep to the weed-cracked paving where crowds once pressed.'
        :'The town’s market; stalls crowd the paving on fair-days, or so the road-talk runs.';
      addPoi(sq.x,sq.y,mktN,mktD);
      if(temple)addPoi(temple.x,temple.y,'Temple of '+t.patron.name,'A precinct kept to '+t.patron.name+', the city’s tutelary god — its columns face the square.');
      if(drawWater&&waterNode)addPoi(waterNode.x,waterNode.y,lakemen?'The Stilt-Wharves':(t.harbor?'The Quays':'The Waterside'),lakemen?'Rows of Lakemen piers on their stilts, reaching out over the water; the folk here live half on land and half above the shallows.':'Stone quays and moored craft along the '+(sea||'shore').toLowerCase()+' water.');
      if(walled&&gates.length){var gg2=gates[0];addPoi(gg2.x,gg2.y,'The '+gg2.dir+' Gate','A gate in the town wall, where the road passes within.');}
      var innName='The '+pick(INN_ADJ)+' '+pick(INN_NOUN);
      if(t.inn&&t.inn.name)innName=t.inn.name;   // canon inn keeps its name (picks above kept: determinism)
      var ia=R()*Math.PI*2,ir=coreR*rr(.25,.5);
      var inx=cx+Math.cos(ia)*ir, iny=cy+Math.sin(ia)*ir;
      if(RV&&t.inn){var ibp=rvNearest(sq.x,sq.y),               // riverside inn: the bank nearest the square
        ivx=sq.x-ibp.x,ivy=sq.y-ibp.y,ivl=Math.hypot(ivx,ivy)||1;
        inx=ibp.x+ivx/ivl*(ibp.w/2+26);iny=ibp.y+ivy/ivl*(ibp.w/2+26);}
      addPoi(inx,iny,innName,innName+' — a travellers’ house near the square'+(goblinish?', delved into the hillside as is the custom under the Wall':'')+', by the reckoning of those who pass through.');
      var odd=pick([{n:'The Old Well',d:'An old well of worn stone, its water counted sweet.'},
        {n:'The Wayshrine',d:'A small roadside shrine, its offerings renewed by no one anyone can name.'},
        {n:'The Standing Stone',d:'A single weathered stone, older than the streets that grew about it.'},
        {n:'The Spring',d:'A clear spring rising among mossed stones; the town draws its luck from it.'},
        {n:'The Wash-Stones',d:'Flat stones at the water-ditch where the washing is beaten and the news is traded.'},
        {n:'The Tithe-Yard',d:'A walled yard where the harvest-tithe is weighed, counted, and grumbled over.'},
        {n:'The Beacon Post',d:'A tarred beacon on its post, unlit in living memory — kept ready all the same.'},
        {n:'The Plague-Stone',d:'A hollowed boundary stone where coins were once left in vinegar; old habits keep it clean.'}]);
      var oa=R()*Math.PI*2,or=coreR*rr(.3,.7);
      addPoi(cx+Math.cos(oa)*or,cy+Math.sin(oa)*or,odd.n,odd.d);
      // towns carry one weightier institution besides (kind-weighted; all conjecture)
      if(t.kind==='town'||t.kind==='capital'){
        var civ=pick([{n:'The Gallows Hill',d:'A bare rise beyond the houses where the town’s justice is done and crows keep the ledger.'},
          {n:'The Horse Fair',d:'A trampled ground that fills with dealers, dust, and dishonesty each season.'},
          {n:'The Tithe-Barn',d:'A long barn of the town’s stores, its doors bound in iron and its ledger jealously kept.'},
          {n:'The Muster Ground',d:'A flat field where the levies drill badly and swear well.'},
          {n:'The Counting-House',d:'Where the town’s tolls and weights are argued into the record.'}]);
        var ca2=R()*Math.PI*2,cr2=coreR*rr(.45,.8);
        addPoi(cx+Math.cos(ca2)*cr2,cy+Math.sin(ca2)*cr2,civ.n,civ.d);
      }
      // floor of 4 POIs (spec §B): a bare village gains a second landmark
      if(pois.length<4){var ex=pick([
        {n:'The Common Green',d:'Open ground where the village gathers and beasts are penned on market-day.'},
        {n:'The Crossroads',d:'Where the roads meet and part; a worn waystone marks the turnings.'},
        {n:'The Old Bridge',d:'A low span of dressed stone over the brook that waters the fields.'}]);
        var ea=R()*Math.PI*2,er=coreR*rr(.35,.6);
        addPoi(cx+Math.cos(ea)*er,cy+Math.sin(ea)*er,ex.n,ex.d);}
    }

    // --- seeded irregular edge vignette (§c): the plan dissolves at its boundary
    // instead of ending in a hard square. destination-out needs the alpha kept at
    // encode time (see registerCityOverlay). Drawn before the cartouche/watermark
    // so that chrome stays crisp over the fade.
    var vharm=[];for(var vh=0;vh<7;vh++)vharm.push({f:vh+2,ph:R()*6.283,am:rr(.012,.05)});
    var vN=128,vgc2=document.createElement('canvas');vgc2.width=vgc2.height=vN;
    var vgx=vgc2.getContext('2d'),vid=vgx.createImageData(vN,vN);
    for(var vy=0;vy<vN;vy++)for(var vx=0;vx<vN;vx++){
      var vdx=(vx+.5)/vN-.5,vdy=(vy+.5)/vN-.5;
      var vr=Math.hypot(vdx,vdy),vth=Math.atan2(vdy,vdx),vw=0;
      for(var vk=0;vk<7;vk++)vw+=vharm[vk].am*Math.sin(vharm[vk].f*vth+vharm[vk].ph);
      var v0=0.385+vw,v1=0.485+vw*0.7,vu=(vr-v0)/(v1-v0);
      vu=vu<0?0:vu>1?1:vu;
      var va=vu*vu*(3-2*vu)*255;
      if(va>4&&va<251){var vn2=Math.sin(vx*127.1+vy*311.7+seed%997)*43758.5453;
        va+=(vn2-Math.floor(vn2)-.5)*70;va=va<0?0:va>255?255:va;}   // ragged, seeded
      vid.data[(vy*vN+vx)*4+3]=va;}
    vgx.putImageData(vid,0,0);
    g.globalCompositeOperation='destination-out';
    g.imageSmoothingEnabled=true;
    g.drawImage(vgc2,0,0,S,S);
    g.globalCompositeOperation='source-over';

    // --- title cartouche + baked hearsay watermark ---
    g.save();
    var ttl=name.toUpperCase(), sub=({capital:'a Māgos',town:'a walled town',village:'a village',ruin:'a ruin · sacked 745 A.B.'})[t.kind]||'';
    g.font='bold 42px Georgia, "Times New Roman", serif';
    var tw2=g.measureText(ttl).width, bxw=Math.max(tw2+40,220), bxh=76;
    g.fillStyle='rgba(243,236,215,.92)';g.strokeStyle='#24435e';g.lineWidth=3;
    g.fillRect(28,28,bxw,bxh);g.strokeRect(28,28,bxw,bxh);
    g.fillStyle='#1e3a52';g.textBaseline='alphabetic';
    g.fillText(ttl,44,74);
    g.font='italic 20px Georgia, serif';g.fillStyle='#5a4a36';g.fillText(sub,45,98);
    g.restore();
    g.save();
    g.font='19px "IBM Plex Mono", monospace';
    var wm='✶ drawn from hearsay — awaiting a true survey';
    var wmw=g.measureText(wm).width;
    g.fillStyle='rgba(243,236,215,.9)';g.strokeStyle='rgba(138,98,36,.5)';g.lineWidth=1.5;
    g.fillRect(28,S-58,wmw+28,38);g.strokeRect(28,S-58,wmw+28,38);
    g.fillStyle='#6a4326';g.fillText(wm,42,S-33);
    g.restore();

    // street-tier stubs (route continuity §): gate → just outside the plan edge, in ATLAS
    // coords, one per land approach — drawn later in the pCity pane so the world road reads
    // as arriving even after the tier-d fade. Pure geometry (no RNG).
    var scl=S/(2*footR(a.kind)), stubs=[];     // canvas px per atlas px
    gates.forEach(function(gg){if(!gg.appr)return;
      var ix=a.atlasX+(gg.x-S/2)/scl, iy=a.atlasY+(gg.y-S/2)/scl;         // gate (exact)
      var ox=a.atlasX+Math.cos(gg.ang)*footR(a.kind)*1.18,
          oy=a.atlasY+Math.sin(gg.ang)*footR(a.kind)*1.18;               // just past the plan edge
      stubs.push({x0:ix,y0:iy,x1:ox,y1:oy});});
    return {canvas:cv,w:S,h:S,pois:pois,stubs:stubs};
  }

  // ---- atlas-derived land/water mask (terrain continuity §a) ----
  // Samples the z5 tiles under a city's footprint (world px ×2 = z5 px), classifies
  // sea by parchment warmth (the atlas sea is grey-teal: r−b ≤ 54; land ≥ 60), treats
  // dark ink as no-signal, box-blurs + rethresholds, and keeps only border-connected
  // water so printed label glyphs never read as lakes. Pure fn of the tiles →
  // deterministic per city; cached forever alongside the canvas it shapes.
  var MASKQ={};                              // key -> {s,m,cbs,applied}
  var LAND_TAN=[198,178,128];                // measured atlas land average (stable)
  function buildCityMask(c,n,ox,oy){
    var d=c.getImageData(0,0,n,n).data,N=n*n,i,x,y,k,s;
    var wat=new Float32Array(N),wgt=new Float32Array(N);
    for(i=0;i<N;i++){var r=d[4*i],gc2=d[4*i+1],b=d[4*i+2];
      if(r*0.299+gc2*0.587+b*0.114>=110){wgt[i]=1;if(r-b<=54)wat[i]=1;}}
    function blur(a){                        // separable box blur, radius 2, edge-clamped
      var t=new Float32Array(N);
      for(y=0;y<n;y++)for(x=0;x<n;x++){s=0;
        for(k=-2;k<=2;k++){var xx=x+k;xx=xx<0?0:xx>=n?n-1:xx;s+=a[y*n+xx];}t[y*n+x]=s/5;}
      for(x=0;x<n;x++)for(y=0;y<n;y++){s=0;
        for(k=-2;k<=2;k++){var yy=y+k;yy=yy<0?0:yy>=n?n-1:yy;s+=t[yy*n+x];}a[y*n+x]=s/5;}
    }
    blur(wat);blur(wgt);
    var m=new Uint8Array(N);
    for(i=0;i<N;i++)m[i]=(wgt[i]>1e-3&&wat[i]/wgt[i]>=0.5)?1:0;
    // keep only water connected to the patch border: real sea always enters from
    // outside the footprint; interior blobs are label ink / jpeg noise.
    var keep=new Uint8Array(N),st=[],p;
    function push(ix){if(m[ix]&&!keep[ix]){keep[ix]=1;st.push(ix);}}
    for(x=0;x<n;x++){push(x);push((n-1)*n+x);}
    for(y=0;y<n;y++){push(y*n);push(y*n+n-1);}
    while(st.length){p=st.pop();x=p%n;y=(p-x)/n;
      if(x>0)push(p-1);if(x<n-1)push(p+1);if(y>0)push(p-n);if(y<n-1)push(p+n);}
    var wf=0,lr=0,lg=0,lb=0,ln=0,cxs=0,cys=0;
    for(i=0;i<N;i++){
      if(keep[i]){wf++;x=i%n;cxs+=x;cys+=(i-x)/n;}
      else if(wgt[i]>0.9&&!m[i]){lr+=d[4*i];lg+=d[4*i+1];lb+=d[4*i+2];ln++;}}
    var land=ln?[Math.round(lr/ln),Math.round(lg/ln),Math.round(lb/ln)]:LAND_TAN;
    var bear=null;
    if(wf>=N*0.01){var vx=cxs/wf-(n-1)/2,vy=cys/wf-(n-1)/2,vl=Math.hypot(vx,vy);
      if(vl>1)bear={x:vx/vl,y:vy/vl};}
    return {n:n,ox:ox,oy:oy,m:keep,frac:wf/N,water:wf/N>=0.025,land:land,bear:bear};
  }
  function sampleCityMask(key,done){
    var q=MASKQ[key];
    if(q){if(q.s)done(q.m);else q.cbs.push(done);return;}
    q=MASKQ[key]={s:0,m:null,cbs:[done],applied:false};
    var a=CITY_ANCHORS[key],rW=footR(a.kind);
    var ox=Math.round((a.atlasX-1.35*rW)*2),oy=Math.round((a.atlasY-1.35*rW)*2),
        n=Math.round(5.4*rW);
    var cv=document.createElement('canvas');cv.width=n;cv.height=n;
    var c=cv.getContext('2d',{willReadFrequently:true});
    c.fillStyle='rgb(198,178,128)';c.fillRect(0,0,n,n);  // absent tiles read as land
    var tx0=Math.floor(ox/256),ty0=Math.floor(oy/256),
        tx1=Math.floor((ox+n-1)/256),ty1=Math.floor((oy+n-1)/256);
    var left=(tx1-tx0+1)*(ty1-ty0+1);
    function one(){if(--left)return;
      try{q.m=buildCityMask(c,n,ox,oy);}catch(e){q.m=null;}
      q.s=1;var cbs=q.cbs;q.cbs=[];
      cbs.forEach(function(f){try{f(q.m);}catch(e){}});}
    for(var ty=ty0;ty<=ty1;ty++)for(var tx=tx0;tx<=tx1;tx++)(function(tx,ty){
      var im=new Image();
      im.onload=function(){c.drawImage(im,tx*256-ox,ty*256-oy);one();};
      im.onerror=one;
      im.src='tiles/5/'+tx+'/'+ty+'.jpg';
    })(tx,ty);
  }

  // generate + register a city's plan on demand (deterministic; cached in CITYREG
  // forever). Async-tolerant (§a): the atlas mask needs its tiles, so the melded
  // plan lands when they do; registerCityOverlay hot-swaps if the city is on screen.
  function ensureCityGen(name){
    try{
      var key=cityAnchorKey(name); if(!key)return;
      var a=CITY_ANCHORS[key]; if(!a)return;
      if(MASKQ[key]&&MASKQ[key].applied)return;
      sampleCityMask(key,function(m){
        var q=MASKQ[key];
        if(q.applied)return; q.applied=true;
        delete WASHC[key];                     // re-tone the wash with the sampled hue
        var t=traitsFor(key),reg=CITYREG[key];
        if(t&&(!reg||reg.prov==='invented')){
          var gen=genCityCanvas(key,t,a,m);
          registerCityOverlay(key,gen.canvas,{prov:'invented',w:gen.w,h:gen.h,
            pois:gen.pois,poiRef:{w:gen.w,h:gen.h},stubs:gen.stubs});
        }
        if(CITYVIEW.name===key)washRefresh(key);
        if(!CHART.on)worldCityUpdate();        // a just-landed reg may deepen maxZoom
      });
    }catch(e){/* one bad city must never break the zoom/maxZoom pass */}
  }
  // synchronous fallback for flyIntoCity: a deep link must never wait on tiles —
  // register the synthetic plan now; the melded one hot-swaps in when sampled.
  function ensureCityGenNow(key){
    try{
      if(CITYREG[key])return;
      var a=CITY_ANCHORS[key],t=traitsFor(key); if(!t||!a)return;
      var q=MASKQ[key],m=(q&&q.s)?q.m:null;
      var gen=genCityCanvas(key,t,a,m);
      registerCityOverlay(key,gen.canvas,{prov:'invented',w:gen.w,h:gen.h,
        pois:gen.pois,poiRef:{w:gen.w,h:gen.h},stubs:gen.stubs});
      if(m)q.applied=true;
    }catch(e){}
  }

  // ---- one-time DOM + data wiring for the meshed world ----
  function meshedWorldInit(anchors,traits){
    if(anchors)for(var k in anchors){if(k==='_readme')continue;
      CITY_ANCHORS[k]=anchors[k];}
    // two extra anchors sourced from maps_markers (spec §A.2)
    CITY_ANCHORS['Summarch']={atlasX:523,atlasY:58,kind:'town',harbor:false,sea:null};
    CITY_ANCHORS['Penthelon']={atlasX:1962,atlasY:644,kind:'village',harbor:true,sea:null}; // footprint on the charted Five Fingers shore (wiki marker floats in the lake)
    for(var kk in CITY_ANCHORS)CITY_ANCHORS_FOLD[fold(kk)]=kk;
    if(traits)for(var t in traits){if(t==='_readme')continue;CITY_TRAITS[t]=traits[t];}

    // real charts (canon) — Epēshu's 19 POIs reproject through the footprint transform.
    var eref=DETAIL['Epēshu']||{w:3914,h:4200};
    registerCityOverlay('Epēshu','art/overlay-Epeshu.jpg',{prov:'canon',w:2863,h:3072,
      poiRef:{w:eref.w,h:eref.h},
      pois:(POIS['Epēshu']||[]).map(function(p){
        return {n:p.n,name:p.name,x:p.x,y:p.y,d:p.d,prov:'canon'};})});
    var sref=DETAIL['Summarch']||{w:4245,h:3951};
    registerCityOverlay('Summarch','art/overlay-Summarch.jpg',{prov:'canon',w:3072,h:2859,
      poiRef:{w:sref.w,h:sref.h},
      pois:(POIS['Summarch']||[]).map(function(p){
        return {n:p.n,name:p.name,x:p.x,y:p.y,d:p.d,wikiSlug:p.wikiSlug,prov:'canon'};})});

    // grain + corner watermark for uncharted country (siblings of the map-pane)
    var mc=map.getContainer();
    var grain=document.createElement('div'); grain.className='uncharted-grain';
    var mark=document.createElement('div'); mark.className='uncharted-mark';
    mark.textContent='✶ uncharted at this scale';
    mc.appendChild(grain); mc.appendChild(mark);
  }

  // ---- The Company strip (experiment D) + Groups button, docked bottom-left ----
  var stripEl=null;
  function showStrip(on){if(stripEl)stripEl.style.display=on?'':'none';}
  function stripClick(p){
    openCompany(p,!!p.origin);
    if(p._omk&&p._omk._icon){var gl=p._omk._icon.querySelector('.glyph');
      if(gl){gl.classList.remove('copulse');void gl.offsetWidth;gl.classList.add('copulse');
        setTimeout(function(){gl.classList.remove('copulse');},2700);}}
    if(p._trail&&companyTrails&&map.hasLayer(companyTrails)){
      var el=p._trail.getElement&&p._trail.getElement();
      if(el){el.classList.add('emph');setTimeout(function(){el.classList.remove('emph');},1900);}}
  }
  function addCompanyDock(){
    var C=L.Control.extend({options:{position:'bottomleft'},onAdd:function(){
      var d=L.DomUtil.create('div','dock');
      var gb=L.DomUtil.create('button','grp-btn',d);
      gb.type='button'; gb.innerHTML='⛊ Groups &amp; Powers';
      gb.addEventListener('click',openFactionsList);
      stripEl=L.DomUtil.create('div','strip',d);
      var tg=L.DomUtil.create('button','strip-toggle',stripEl);
      tg.type='button'; tg.textContent='⚑'; tg.title='Collapse the Company';
      tg.addEventListener('click',function(){stripEl.classList.toggle('collapsed');
        tg.title=stripEl.classList.contains('collapsed')?'Show the Company':'Collapse the Company';});
      var lb=L.DomUtil.create('span','strip-lbl',stripEl); lb.textContent='The Company';
      PARTY.forEach(function(p){
        var c=L.DomUtil.create('div','co-chip'+(p.status==='dead'?' dead':''),stripEl);
        c.style.background=p.color; c.textContent=mono(p.name);
        c.title=p.name+(p.epithet?' — '+p.epithet:'');
        c.addEventListener('click',function(){stripClick(p);});
      });
      L.DomEvent.disableClickPropagation(d);
      L.DomEvent.disableScrollPropagation(d);
      return d;
    }});
    map.addControl(new C());
  }

  // ---- journey play-through ----
  var jrn={on:false,i:0};
  function setRoutePlaying(on){
    if(!routePoly)return;
    var el=routePoly.getElement&&routePoly.getElement();
    if(el)el.classList.toggle('playing',on);
  }
  function startJourney(){
    if(!ROUTE.length)return;
    jrn.on=true; setRoutePlaying(true); jrnBtn.classList.add('on');
    goWaypoint(0);
  }
  function stopJourney(){
    if(!jrn.on)return;
    jrn.on=false; setRoutePlaying(false); jrnBtn.classList.remove('on');
  }

  // ---- controls ----
  var jrnBtn; // set when journey control added
  function addEraControl(){
    var C=L.Control.extend({options:{position:'topright'},
      onAdd:function(){
        var d=L.DomUtil.create('div','era-ctrl');
        d.setAttribute('role','radiogroup');
        d.setAttribute('aria-label','The Atlas Through the Ages');
        d.className+=' era-collapsed';
        d.innerHTML='<div class="era-title" role="button" tabindex="0" title="The Atlas Through the Ages">'+
          '<span class="era-cur">Modern</span> <span class="era-caret">▾</span></div>'+
          '<label><input type="radio" name="era" value="modern" autocomplete="off"> Modern (1374 A.B.)</label>'+
          '<label><input type="radio" name="era" value="war" autocomplete="off"> War of the Patrons (1124–1133)</label>'+
          '<label><input type="radio" name="era" value="imperial" autocomplete="off"> Imperial (the golden age)</label>';
        L.DomEvent.disableClickPropagation(d);
        L.DomEvent.disableScrollPropagation(d);
        d.addEventListener('change',function(e){
          if(e.target&&e.target.name==='era'){setEra(e.target.value);
            var lbl={modern:'Modern',war:'War of the Patrons',imperial:'Imperial'}[e.target.value]||e.target.value;
            var cur=d.querySelector('.era-cur'); if(cur)cur.textContent=lbl;
            d.classList.add('era-collapsed');}
        });
        var tt=d.querySelector('.era-title');
        function eraToggle(){d.classList.toggle('era-collapsed');}
        tt.addEventListener('click',eraToggle);
        tt.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();eraToggle();}});
        // force the default regardless of browser form-state restoration
        d.querySelector('input[value="modern"]').checked=true;
        eraInputs=d.querySelectorAll('input[name=era]');
        return d;
      }});
    map.addControl(new C());
  }
  function addJourneyControl(){
    var C=L.Control.extend({options:{position:'topright'},
      onAdd:function(){
        var d=L.DomUtil.create('div','jrn-ctrl');
        jrnBtn=L.DomUtil.create('button','',d);
        jrnBtn.type='button'; jrnBtn.textContent='⚑ Follow the journey';
        L.DomEvent.disableClickPropagation(d);
        jrnBtn.addEventListener('click',function(){
          if(jrn.on)stopJourney(); else startJourney();
        });
        return d;
      }});
    map.addControl(new C());
  }

  // ---- scale bar (Cyrikon miles) ----
  var MI_PER_NATIVE=600/723; // 600 Imperial (Cyrikon) mi ≈ 723 native px
  var scaleEl=null;
  function addScaleControl(){
    var C=L.Control.extend({options:{position:'bottomleft'},
      onAdd:function(){scaleEl=L.DomUtil.create('div','scalebar');
        L.DomEvent.disableClickPropagation(scaleEl);return scaleEl;}});
    map.addControl(new C());
  }
  function niceRound(v){
    if(v<=0)return 1;
    var p=Math.pow(10,Math.floor(Math.log10(v))), f=v/p;
    var n=f>=5?5:f>=2.5?2.5:f>=2?2:1;
    return n*p;
  }
  function fmtMi(v){v=Math.round(v);return v>=1000?v.toLocaleString('en-US'):''+v;}
  function updScale(){
    if(!scaleEl||CHART.on)return;             // the world scale bar is hidden in chart mode
    var a=map.latLngToContainerPoint(px(0,0)),
        b=map.latLngToContainerPoint(px(1000,0));
    var screenPerNative=Math.abs(b.x-a.x)/1000;          // screen px per native px
    if(!screenPerNative){scaleEl.innerHTML='';return;}
    var miPerScreen=MI_PER_NATIVE/screenPerNative;        // miles per screen px
    var nice=niceRound(miPerScreen*112);                  // ~target width
    var w=nice/miPerScreen;
    scaleEl.innerHTML=
      '<div class="sb-track" style="width:'+w.toFixed(0)+'px">'+
        '<div class="sb-seg" style="width:50%"></div>'+
        '<div class="sb-seg alt" style="width:50%"></div>'+
      '</div>'+
      '<div class="sb-ticks" style="width:'+w.toFixed(0)+'px">'+
        '<span>0</span><span>'+fmtMi(nice/2)+'</span><span>'+fmtMi(nice)+' mi</span></div>';
  }

  // ---- search ----
  var searchEl=document.getElementById('search'),
      sugEl=document.getElementById('suggest'), sugIdx=-1, sugItems=[];
  function renderSug(list){
    sugItems=list;sugIdx=-1;
    if(!list.length){sugEl.className='';sugEl.innerHTML='';return;}
    sugEl.innerHTML=list.map(function(m,i){
      return '<div class="sug" data-i="'+i+'"><span>'+esc(m.name)+'</span> '+
        '<span class="st">'+esc(m.minor?'Lesser settlement':m.type)+'</span></div>';
    }).join('');
    sugEl.className='on';
    Array.prototype.forEach.call(sugEl.children,function(el){
      el.addEventListener('mousedown',function(e){e.preventDefault();
        pick(sugItems[+el.getAttribute('data-i')]);});
    });
  }
  function pick(m){if(!m)return;searchEl.value=m.name;sugEl.className='';
    if(m._t==='poi'){openPOI(m._chart,m._poi);
      if(m._poi._pmk)map.panTo(m._poi._pmk.getLatLng(),{animate:false});return;}
    if(CHART.on)exitChart();                 // any world result leaves the chart first
    if(m._t==='company')openCompanyByName(m.name,true);
    else if(m._t==='faction')openFactionByName(m.name,true);
    else{flyToMarker(m);openPlace(m);}}
  function doSearch(q){
    q=fold(q);if(!q)return renderSug([]);
    var hits=[];
    if(CHART.on&&CHART.pois)CHART.pois.forEach(function(p){if(fold(p.name).indexOf(q)>=0)
      hits.push({name:p.name,type:'Point · '+CHART.name,_t:'poi',_poi:p,_chart:CHART.name});});
    // match name OR type words (so "settlement" surfaces settlements, incl. traced lesser ones)
    MARKERS.forEach(function(m){var ty=m.minor?'lesser settlement':fold(m.type||'');
      if(fold(m.name).indexOf(q)>=0||ty.indexOf(q)>=0)hits.push(m);});
    PARTY.forEach(function(p){if(fold(p.name).indexOf(q)>=0)
      hits.push({name:p.name,type:'Company',_t:'company'});});
    FACTIONS.forEach(function(f){if(fold(f.name).indexOf(q)>=0)
      hits.push({name:f.name,type:'Faction',_t:'faction'});});
    hits.sort(function(a,b){return fold(a.name).indexOf(q)-fold(b.name).indexOf(q);});
    renderSug(hits.slice(0,10));
  }
  searchEl.addEventListener('input',function(){doSearch(this.value);});
  searchEl.addEventListener('keydown',function(e){
    if(e.key==='ArrowDown'||e.key==='ArrowUp'){e.preventDefault();
      if(!sugItems.length)return;
      sugIdx+=(e.key==='ArrowDown'?1:-1);
      sugIdx=(sugIdx+sugItems.length)%sugItems.length;
      Array.prototype.forEach.call(sugEl.children,function(el,i){
        el.className='sug'+(i===sugIdx?' active':'');});
    }else if(e.key==='Enter'){
      pick(sugIdx>=0?sugItems[sugIdx]:sugItems[0]);
    }else if(e.key==='Escape'){sugEl.className='';}
  });
  document.addEventListener('click',function(e){
    if(!e.target.closest('.search-wrap'))sugEl.className='';});
  document.addEventListener('keydown',function(e){
    if(e.key!=='Escape'||sugEl.className==='on')return;
    if(CHART.on){exitChart();return;}          // chart-mode Escape has priority
    if(panel.classList.contains('open'))closePanel();
  });

  // ---- zoom-tier reveal ----
  function tierFor(z){
    var bz=tierZoom('b'), cz=tierZoom('c');
    return z>=cz-0.01?'c':z>=bz-0.01?'b':'a';
  }
  function updTier(){
    if(CHART.on)return;                       // world tiers are dormant inside a chart
    var t=tierFor(map.getZoom()), c=map.getContainer();
    c.classList.toggle('map-tier-a',t==='a');
    c.classList.toggle('map-tier-b',t==='b');
    c.classList.toggle('map-tier-c',t==='c');
    c.classList.toggle('atlas-labels',t==='c'); // labels on at closest tier
  }
  map.on('zoomend',updTier);
  map.on('zoom zoomend moveend',updScale);
  // meshed world: opacity/tier-d/watermark ride the LIVE 'zoom' (smooth crossfade);
  // nearest-city / instantiate / GC / setMaxZoom only on zoomend+moveend (never mid-fly).
  map.on('zoom zoomend moveend',worldOpacityUpdate);
  map.on('zoomend moveend',worldCityUpdate);

  // ---- deep link (#place=Name) ----
  function hashVal(re){var m=String(location.hash||'').match(re);if(!m)return null;
    try{return decodeURIComponent(m[1]);}catch(_){return m[1];}}
  function handleHash(){
    var ch=hashVal(/chart=([^&]+)/);
    if(ch){var poi=hashVal(/[?&]poi=(\d+)/); poi=poi?+poi:0;
      if(isFlyInCity(ch)){                    // city chart → fly into the world overlay
        if(CHART.on)exitChart();
        flyIntoCity(ch,poi);
      }else if(!(CHART.on&&CHART.name===detailKey(ch)))enterChart(ch,poi);
      else if(poi)selectPOI(CHART.name,poi);
      return;}
    if(CHART.on)exitChart();                  // hash left the chart → leave chart mode
    var c=hashVal(/company=([^&]+)/); if(c){openCompanyByName(c,true);return;}
    var f=hashVal(/faction=([^&]+)/); if(f){openFactionByName(f,true);return;}
    var name=hashVal(/place=([^&]+)/); if(!name)return;
    var mk=MREF[fold(name)];
    if(mk){flyToMarker(mk);openPlace(mk);}
  }

  // ---- load everything ----
  function getJSON(u){return fetch(u).then(function(r){
    if(!r.ok)throw new Error(u+' '+r.status);return r.json();}).catch(function(){return null;});}

  Promise.all([
    getJSON('data/maps_markers.json'),
    getJSON('data/wiki-places.json'),
    getJSON('data/reviews.json'),
    getJSON('data/party-route.json'),
    getJSON('data/realms.geojson'),
    getJSON('data/party.json'),
    getJSON('data/factions.json'),
    getJSON('data/detail-charts.json'),
    getJSON('data/chart-pois.json'),
    getJSON('data/location-art.json'),
    getJSON('data/city-anchors.json'),
    getJSON('data/city-traits.json'),
    getJSON('data/sea-lanes.json'),
    getJSON('data/named-ways.json'),
    getJSON('data/minor-regions.geojson')
  ]).then(function(res){
    var markers=res[0]||[], wiki=res[1]||[], reviews=res[2]||[],
        route=res[3]||[], realms=res[4];
    PARTY=res[5]||[]; FACTIONS=res[6]||[];
    DETAIL=res[7]||{}; POIS=res[8]||{}; LOCART=res[9]||{};

    wiki.forEach(function(p){WIKI[p.title]=p;WIKIFOLD[fold(p.title)]=p;});
    reviews.forEach(function(r){(REVIEWS[r.place]=REVIEWS[r.place]||[]).push(r);});
    PARTY.forEach(function(p){PMREF[fold(p.name)]=p;});
    FACTIONS.forEach(function(f){FMREF[fold(f.name)]=f;});
    Object.keys(DETAIL).forEach(function(k){DETAILFOLD[fold(k)]=k;});
    Object.keys(LOCART).forEach(function(k){LOCARTFOLD[fold(k)]=LOCART[k];});

    meshedWorldInit(res[10],res[11]);      // anchors + traits + real overlays (before handleHash)
    buildApprPolys(route,res[13],res[12]); // approach bearings: anchors + polylines ready, before any gen

    buildMarkers(markers);

    var overlays={};
    var order=['Settlements','Major Regions','Minor Regions','Bodies of Water','Mountains and Hills'];
    var TL={'Settlements':'⌂ Settlements','Major Regions':'✦ Major Regions',
      'Minor Regions':'◆ Minor Regions','Bodies of Water':'≈ Bodies of Water',
      'Mountains and Hills':'▲ Mountains & Hills'};
    order.forEach(function(t){if(LAYERS[t]){LAYERS[t].addTo(map);overlays[TL[t]]=LAYERS[t];}
      // indented sub-toggle beneath Settlements: traced-census lesser settlements, default ON
      if(t==='Settlements'){LESSER.addTo(map);overlays[' ⌂ Lesser settlements']=LESSER;}});

    var realmLayer=buildRealms(realms);
    if(realmLayer){realmLayer.addTo(map);overlays['⚑ Realm Boundaries']=realmLayer;}

    var routeLayer=buildRoute(route);
    if(routeLayer){routeLayer.addTo(map);overlays['⚔ Party Route']=routeLayer;}

    // ---- Company + Factions layers (each experiment toggleable; default ON) ----
    var companyOrigins=buildOrigins();   // A
    companyTrails=buildTrails();          // C (module-scoped for strip emphasis)
    var companyMaster=L.layerGroup();     // D-master handle (toggles A+C+strip together)
    var factionBadges=buildFactionBadges();
    companyOrigins.addTo(map); companyTrails.addTo(map); companyMaster.addTo(map);
    factionBadges.addTo(map);
    overlays['⚑ The Company']=companyMaster;
    overlays[' ⚑ Origin homelands']=companyOrigins;
    overlays[' ⋯ Origin trails']=companyTrails;
    overlays['⛊ Faction seats']=factionBadges;

    // ---- Ways & Waters (spec WW): master + three toggleable sublayers ----
    var seaLanes=buildSeaLanes(res[12]);
    var namedWays=buildNamedWays(res[13]);
    var districtBorders=buildDistricts(res[14]);
    var wwMaster=L.layerGroup();          // master handle (toggles lanes+ways together)
    wwMaster.addTo(map);
    if(seaLanes)seaLanes.addTo(map);      // default ON
    if(namedWays)namedWays.addTo(map);    // default ON
    // district borders stay OFF by default (specialist detail) — registered, not added
    overlays['≈ Ways & Waters']=wwMaster;
    if(seaLanes)overlays[' ⛵ Sea lanes']=seaLanes;
    if(namedWays)overlays[' ⌖ Named ways']=namedWays;
    if(districtBorders)overlays[' ◌ District borders']=districtBorders;

    addEraControl();
    layersCtrl=L.control.layers(null,overlays,{collapsed:true,position:'topright'});   // compact icon; expands on hover/tap
    layersCtrl.addTo(map);
    (function(){var lc=layersCtrl.getContainer&&layersCtrl.getContainer();
      if(!lc)return;var lg=L.DomUtil.create('div','prov-legend',
        lc.querySelector('.leaflet-control-layers-list')||lc);
      lg.innerHTML='✶ = conjecture · ⌖ = traced from the atlas, refined as the archives grow.';})();
    addJourneyControl();
    addScaleControl();
    addCompanyDock();                     // after scale → strip sits above the scale bar

    // master toggle drives the sub-layers + strip. Coordination is DEFERRED to a
    // timeout so it runs AFTER Control.Layers' _onInputClick finishes its own add/
    // remove loop (which would otherwise re-add the sub-layers from their still-checked
    // boxes, and where a synchronous _update() would corrupt the in-flight input list).
    function coordMaster(on){
      if(on){
        if(!map.hasLayer(companyOrigins))companyOrigins.addTo(map);
        if(!map.hasLayer(companyTrails))companyTrails.addTo(map);
      }else{
        if(map.hasLayer(companyOrigins))map.removeLayer(companyOrigins);
        if(map.hasLayer(companyTrails))map.removeLayer(companyTrails);
      }
      showStrip(on);
      if(layersCtrl&&layersCtrl._update)layersCtrl._update();  // reconcile checkboxes
    }
    var _mSync;
    map.on('overlayadd',function(e){if(e.layer===companyMaster){
      clearTimeout(_mSync);_mSync=setTimeout(function(){coordMaster(true);},0);}});
    map.on('overlayremove',function(e){if(e.layer===companyMaster){
      clearTimeout(_mSync);_mSync=setTimeout(function(){coordMaster(false);},0);}});

    // Ways & Waters master mirrors the Company pattern: toggling it drives lanes + ways
    // (districts stay off unless the reader opts in). Same deferred reconcile so it runs
    // after Control.Layers finishes its own add/remove loop.
    var _wwDistrictWasOn=false;   // remember reader's opt-in district state across a master OFF→ON
    function coordWW(on){
      if(on){
        if(seaLanes&&!map.hasLayer(seaLanes))seaLanes.addTo(map);
        if(namedWays&&!map.hasLayer(namedWays))namedWays.addTo(map);
        if(_wwDistrictWasOn&&districtBorders&&!map.hasLayer(districtBorders))districtBorders.addTo(map);
      }else{
        // capture whether district borders were on BEFORE we remove them, so the master
        // OFF→ON round trip restores them (lanes/ways always round-trip; districts are opt-in).
        _wwDistrictWasOn=!!(districtBorders&&map.hasLayer(districtBorders));
        if(seaLanes&&map.hasLayer(seaLanes))map.removeLayer(seaLanes);
        if(namedWays&&map.hasLayer(namedWays))map.removeLayer(namedWays);
        if(districtBorders&&map.hasLayer(districtBorders))map.removeLayer(districtBorders);
      }
      if(layersCtrl&&layersCtrl._update)layersCtrl._update();
    }
    var _wSync;
    map.on('overlayadd',function(e){if(e.layer===wwMaster){
      clearTimeout(_wSync);_wSync=setTimeout(function(){coordWW(true);},0);}});
    map.on('overlayremove',function(e){if(e.layer===wwMaster){
      clearTimeout(_wSync);_wSync=setTimeout(function(){coordWW(false);},0);}});

    updTier(); updScale(); worldOpacityUpdate(); worldCityUpdate(); handleHash();
    window.addEventListener('hashchange',handleHash);

    window.ATLAS={map:map,markers:MARKERS,party:PARTY,factions:FACTIONS,ready:true,
      find:function(n){return MREF[fold(n)];},
      fly:function(n){var m=MREF[fold(n)];if(m){flyToMarker(m);openPlace(m);}return !!m;},
      company:function(n){return openCompanyByName(n,true);},
      faction:function(n){return openFactionByName(n,true);},
      groups:openFactionsList,
      era:setEra, journey:startJourney, stopJourney:stopJourney,
      openRealm:openRealm, close:closePanel,
      chart:function(n,poi){return enterChart(n,poi||0);}, exitChart:exitChart,
      chartOn:function(){return CHART.on;},
      // meshed world (spec MW): descend into a city + the generator's overlay hook
      descend:function(n,poi){return flyIntoCity(n,poi||0);},
      registerCityOverlay:registerCityOverlay,
      cityAnchors:CITY_ANCHORS, cityReg:CITYREG, cityTraits:CITY_TRAITS};
  });
})();
</script>
